
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Facilities Feedback Report</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#f5f3ff;--surface:#fff;--surface2:#f5f3ff;--border:#ede9fe;--text:#1e1b4b;--sub:#6d28d9;--dim:#8b5cf6;--red:#dc2626;--amber:#d97706;--green:#059669;--blue:#4f46e5;--red-bg:#fef2f2;--amber-bg:#fffbeb;--green-bg:#d1fae5;--blue-bg:#ede9fe;--purple:#4f46e5;--purple-dark:#1e1b4b;--purple-light:#ede9fe;--purple-mid:#6d28d9;--shadow:0 2px 8px rgba(79,70,229,.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1e1b4b;border-right:none;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;padding:0;flex-shrink:0;z-index:50;transition:transform .2s;display:flex;flex-direction:column}
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:8px}
.sidebar-title{font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px}
.sidebar-logo{width:30px;height:30px;background:#4f46e5;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-sub{font-size:9px;color:#a5b4fc;margin-top:2px;padding-left:40px}
.sb-section{padding:0 10px;margin-bottom:4px}
.sb-year{font-size:10px;font-weight:600;color:#a5b4fc;padding:5px 8px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:6px}
.sb-year:hover,.sb-year.open{color:#c7d2fe}
.sb-year svg{width:10px;height:10px;transition:transform .15s;stroke:currentColor;fill:none;stroke-width:2}
.sb-year.open svg{transform:rotate(90deg)}
.sb-months{display:block;padding-left:8px}
.sb-month{font-size:10px;font-weight:600;color:#818cf8;padding:4px 8px;cursor:pointer;border-radius:5px;margin-top:2px}
.sb-month:hover,.sb-month.open{color:#c7d2fe}
.sb-dates{display:block;padding-left:8px}
.sb-date{font-size:11px;color:#c7d2fe;padding:6px 10px;cursor:pointer;border-radius:8px;transition:all .1s;display:flex;align-items:center;justify-content:space-between;margin:2px 0}
.sb-date:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-date.active{background:#4f46e5;color:#fff;font-weight:600}
.sb-date-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0}

.sb-date-count{font-size:9px;background:rgba(255,255,255,.15);padding:1px 6px;border-radius:4px;color:#c7d2fe}
.header{background:#fff;border-bottom:1px solid #ede9fe;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(79,70,229,.06)}
.header-left{display:flex;align-items:center;gap:10px}
.menu-btn{display:none;width:32px;height:32px;border-radius:8px;border:1px solid #ede9fe;background:#f5f3ff;color:#6d28d9;cursor:pointer;align-items:center;justify-content:center;font-size:16px}
.brand-name{font-size:14px;font-weight:700;color:#1e1b4b}
.brand-date{font-size:10px;color:#7c3aed;font-weight:500;margin-top:1px}
.theme-btn{display:none}
.dl-btn{display:none;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:none;background:#1e1b4b;color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.dl-btn:hover{background:#2d2a6e}

.main{padding:20px 20px 48px;max-width:780px;margin:0 auto}
.sec-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#7c3aed;font-weight:600;margin:22px 0 10px}

.empty-state-icon{font-size:28px;margin-bottom:8px}

.cat-name{font-size:12px;font-weight:700;color:#1e1b4b;margin-bottom:8px}
.cat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-label{font-size:10px;color:#8b5cf6}

.resolved-item:last-child{border-bottom:none}

.resolved-badge{font-size:9px;font-weight:600;padding:3px 10px;border-radius:6px;background:#d1fae5;color:#065f46;white-space:nowrap;flex-shrink:0}

.resolve-modal-hdr{background:#1e1b4b;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.resolve-modal-title{font-size:13px;font-weight:700;color:#fff}

.resolve-modal-body{padding:16px 18px}
.resolve-issue-box{background:#fef2f2;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:#374151;line-height:1.5}

.filter-row{display:flex;gap:8px;margin-bottom:10px}
.uni-select{background:#fff;border:1px solid #ede9fe;border-radius:8px;padding:8px 12px;font-size:12px;color:#1e1b4b;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 1px 4px rgba(79,70,229,.06)}
.search-wrap{position:relative;flex:1}
.search-input{width:100%;background:#fff;border:1px solid #ede9fe;border-radius:10px;color:#1e1b4b;font-size:13px;padding:10px 12px 10px 33px;outline:none}
.search-input::placeholder{color:#a78bfa}.search-input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.08)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#a78bfa}
.search-ico svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.resp-card{background:#fff;border:1px solid #ede9fe;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(79,70,229,.06)}
.resp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.resp-name{font-size:13px;font-weight:700;color:#1e1b4b}
.resp-meta{font-size:10px;color:#8b5cf6}

.resp-item{font-size:10px;color:#6d28d9;display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f5f3ff;border-radius:4px;transition:all .15s}
.resp-item-highlight{background:#ede9fe;padding:3px 6px;border-bottom:1px solid #c4b5fd;font-weight:700;color:#4f46e5}
.chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px}

.uni-group{background:#fff;border:1px solid #ede9fe;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 8px rgba(79,70,229,.06)}
.uni-group-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:background .1s;background:#faf9ff}
.uni-group-header:hover{background:#f5f3ff}
.uni-group-title{font-size:13px;font-weight:700;color:#1e1b4b;display:flex;align-items:center;gap:8px}
.uni-group-stats{display:flex;align-items:center;gap:8px;font-size:10px;color:#7c3aed;font-weight:500}
.uni-group-chevron{transition:transform .2s;color:#a78bfa;font-size:10px}

.uni-group-body{display:none;border-top:1px solid #f0effe}
.uni-group-body.open{display:block}
.p-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f5f3ff;cursor:pointer;transition:background .1s}
.p-row:last-child{border-bottom:none}
.p-row:hover{background:#faf9ff}
.p-av{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.p-info{flex:1;min-width:0}
.p-name{font-size:12px;font-weight:600;color:#1e1b4b}
.p-meta{font-size:10px;color:#8b5cf6;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.p-submissions{font-size:10px;color:#7c3aed}
.st{font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;white-space:nowrap}
.st-sub{background:#d1fae5;color:#065f46}.st-op{background:#fffbeb;color:#92400e}.st-no{background:#f5f3ff;color:#7c3aed;border:1px solid #ede9fe}
.modal-overlay{position:fixed;inset:0;background:rgba(30,27,75,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(79,70,229,.25)}
.modal-header{padding:16px 20px;border-bottom:1px solid #ede9fe;display:flex;align-items:center;justify-content:space-between;background:#faf9ff}
.modal-title{font-size:14px;font-weight:700;color:#1e1b4b}
.modal-close{width:28px;height:28px;border-radius:7px;border:1px solid #ede9fe;background:#fff;color:#6d28d9;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.modal-body{overflow-y:auto;padding:16px 20px;flex:1}
.modal-section{margin-bottom:16px}
.modal-section-title{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#8b5cf6;font-weight:600;margin-bottom:8px}
.modal-cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}

.modal-cat-name{font-size:10px;font-weight:600;color:#7c3aed;margin-bottom:4px}
.modal-cat-rating{font-size:11px;font-weight:700}
.modal-cat-note{font-size:10px;color:#6d28d9;margin-top:3px;line-height:1.4}

@media(max-width:768px){

<body>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title"><img src="https://raw.githubusercontent.com/programopscentral-art/infra-reports/main/niat-logo.png" style="width:30px;height:30px;border-radius:8px;object-fit:cover;background:#4f46e5" loading="eager" onerror="this.style.background='#4f46e5';this.style.display='block'"/>NIAT</div>
      <div class="sidebar-sub">Facilities Feedback</div>
    </div>
    <div id="sidebar-nav"></div>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="header">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleSidebar()">&#9776;</button>
        <div>
          <div class="brand-name">Facilities Feedback</div>
          <div class="brand-date" id="hdr-date">&#8212;</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="dl-btn" id="dl-btn" onclick="downloadReport()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download Report</button>
      </div>
    </div>
    <div class="main" id="main-content">
      <div class="no-data"><div class="no-data-icon">&#128203;</div><div class="no-data-title">Select a date</div><div class="no-data-sub">Choose a Saturday from the sidebar<br>to view that week's feedback.</div></div>
    </div>
  </div>

<script>
// DATA_START
const REPORT_DATE = "2026-06-27";
const UNIVERSITIES = ["AMET","ADYPU","Annamacharya","Aurora","BITS-Chevella","CDU","CITY & CIET","Crescent","KKH","Mallareddy","NIAT Chevella","NIU","NRI","NSRIT","S-VYASA","SGU","Takshashila","VGU","Yenepoya"];
const HISTORY = {};
// DATA_END

const CAT_NAMES={tv:'TV',audio:'Audio',internet:'Internet/Wi-Fi',ac:'AC',benches:'Benches & Power'};
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentDate = null;
let currentFeedback = [];

function isValidFeedback(f) {
  if (!f.student || f.student.trim().length < 2) return false;
  if (!f.university || f.university.trim().length < 2) return false;
  if (!f.email || !f.email.includes('@')) return false;
  return true;
}

function isValidParticipation(p) {
  if (!p.name || p.name.trim().length < 2) return false;
  if (!p.university || p.university.trim().length < 2) return false;
  return true;
}

function ratingColor(v){return v>=3.5?'var(--green)':v>=2.5?'var(--amber)':'var(--red)'}
function chipCls(v){const l=String(v||'').toLowerCase();return l==='excellent'?'chip-e':l==='good'?'chip-g':l==='average'?'chip-a':l==='poor'?'chip-p':'chip-g'}
function ratingNumD(v){return ({excellent:4,good:3,average:2,poor:1})[String(v||'').toLowerCase().trim()]||0;}

function subDate(f){
  const ts=String((f&&(f.timestamp||f.date))||'').trim();
  let m=ts.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return m[1]+'-'+m[2]+'-'+m[3];
  m=ts.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m) return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  return '';
}
function isLate(f){ const d=subDate(f); return !!(d && currentDate && d>currentDate); }
function fmtSub(f){ const d=subDate(f); if(!d) return ''; const p=d.split('-'); return MONTHS[parseInt(p[1])-1]+' '+parseInt(p[2]); }
let lateOnly=false;
function toggleLate(){
  lateOnly=!lateOnly;
  const b=document.getElementById('late-toggle');
  if(b){
    b.style.background=lateOnly?'var(--purple)':'#fff';
    b.style.color=lateOnly?'#fff':'var(--sub)';
    b.style.borderColor=lateOnly?'var(--purple)':'var(--border)';
  }
  filterResponses();
}

function weeklySeries(){
  const ff={tv:'functioning',audio:'functioning',internet:'available',ac:'comfortable',benches:'sockets'};
  return Object.keys(HISTORY)
    .filter(d => (HISTORY[d].feedback||[]).filter(isValidFeedback).length>0)
    .sort()
    .map(d => {
      const fb=(HISTORY[d].feedback||[]).filter(isValidFeedback);
      const cats={}; let flags=0;
      Object.keys(CAT_NAMES).forEach(k=>{
        const rs=fb.map(f=>ratingNumD(f[k]?.rating)).filter(v=>v>0);
        cats[k]=rs.length?rs.reduce((a,b)=>a+b,0)/rs.length:0;
        flags+=fb.filter(f=>String(f[k]?.rating||'').trim()==='Poor'||String(f[k]?.[ff[k]]||'').trim()==='No'||(k==='internet'&&String(f[k]?.issues||'').trim()==='Yes')).length;
      });
      const ov=fb.map(f=>f.overall).filter(v=>v>0);
      return {date:d, responses:fb.length, flags, avgOverall: ov.length?ov.reduce((a,b)=>a+b,0)/ov.length:0, cats};
    });
}

function deltaBadge(diff, goodUp, fmt){
  const r=Math.round(diff*10)/10;
  if(!isFinite(r)||r===0) return '<span style="font-size:9px;color:var(--dim);margin-left:5px">\u2014</span>';
  const up=r>0, good = goodUp?up:!up;
  return '<span style="font-size:9px;font-weight:700;color:'+(good?'var(--green)':'var(--red)')+';margin-left:5px">'+(up?'\u25B2':'\u25BC')+fmt(Math.abs(r))+'</span>';
}
function wkDelta(date, STATS){
  const s=weeklySeries(), idx=s.findIndex(w=>w.date===date), prev = idx>0 ? s[idx-1] : null;
  if(!prev) return {responses:'',avg:'',flags:''};
  return {
    responses: deltaBadge(STATS.totalResponses-prev.responses, true,  v=>v),
    avg:       deltaBadge((STATS.avgOverall||0)-(prev.avgOverall||0), true,  v=>v.toFixed(1)),
    flags:     deltaBadge((STATS.flagCount||0)-prev.flags, false, v=>v)
  };
}

function buildHeatmap(FEEDBACK){
  const unis=[...new Set(FEEDBACK.map(f=>f.university).filter(Boolean))].sort();
  if(!unis.length) return '';
  const cats=Object.keys(CAT_NAMES);
  const cell=v=>{
    if(!v) return '<td style="text-align:center;padding:7px 4px;color:var(--dim);font-size:11px;background:var(--surface2)">\u2014</td>';
    const bg=v>=3.5?'var(--green-bg)':v>=2.5?'var(--amber-bg)':'var(--red-bg)';
    return '<td style="text-align:center;padding:7px 4px;font-size:11px;font-weight:700;color:'+ratingColor(v)+';background:'+bg+'">'+v.toFixed(1)+'</td>';
  };
  const heads=cats.map(k=>'<th style="padding:7px 4px;font-size:9px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.03em">'+CAT_NAMES[k]+'</th>').join('');
  const rows=unis.map(u=>{
    const ufb=FEEDBACK.filter(f=>f.university===u);
    const tds=cats.map(k=>{ const rs=ufb.map(f=>ratingNumD(f[k]?.rating)).filter(x=>x>0); return cell(rs.length?rs.reduce((a,b)=>a+b,0)/rs.length:0); }).join('');
    return '<tr><td style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--text);white-space:nowrap">'+esc(u)+' <span style="color:var(--dim);font-weight:400">('+ufb.length+')</span></td>'+tds+'</tr>';
  }).join('');
  return '<div style="background:#fff;border:1px solid var(--border);border-radius:14px;overflow-x:auto;box-shadow:var(--shadow)"><table style="width:100%;border-collapse:collapse;min-width:520px"><tr style="background:#faf9ff"><th style="text-align:left;padding:7px 10px;font-size:9px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.03em">University</th>'+heads+'</tr>'+rows+'</table></div>';
}
function initials(n){return(n||'?').split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function buildSidebar(){
  const dates = Object.keys(HISTORY).filter(d => { const h = HISTORY[d]; return h && (h.feedback||[]).filter(isValidFeedback).length > 0; }).sort().reverse();
  if(!dates.length){ document.getElementById('sidebar-nav').innerHTML='<div class="sb-empty">No reports yet.<br>Run the workflow on Saturday to generate one.</div>'; return; }
  const tree = {};
  dates.forEach(d => { const [y,m] = d.split('-'); if(!tree[y]) tree[y]={}; const mName = MONTHS[parseInt(m)-1]; if(!tree[y][mName]) tree[y][mName]=[]; tree[y][mName].push(d); });
  let html = '';
  Object.keys(tree).sort().reverse().forEach(year => {
    html += '<div class="sb-section">';
    html += '<div class="sb-year open" onclick="toggleSbYear(this)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'+year+'</div>';
    html += '<div class="sb-months" style="display:block">';
    Object.keys(tree[year]).forEach(month => {
      html += '<div class="sb-month open" onclick="toggleSbMonth(this)">'+month+'</div>';
      html += '<div class="sb-dates" style="display:block">';
      tree[year][month].forEach(d => {
        const day = parseInt(d.split('-')[2]);
        const count = (HISTORY[d].feedback||[]).filter(isValidFeedback).length;
        html += '<div class="sb-date" onclick="loadDate(\''+d+'\')"><span>Sat '+day+'</span><span class="sb-date-count">'+count+'</span></div>';
      });
      html += '</div>';
    });
    html += '</div></div>';
  });
  document.getElementById('sidebar-nav').innerHTML = html;
}

function toggleSbYear(el){ el.classList.toggle('open'); const months = el.nextElementSibling; if(months) months.style.display = el.classList.contains('open') ? 'block' : 'none'; }
function toggleSbMonth(el){ el.classList.toggle('open'); const dates = el.nextElementSibling; if(dates) dates.style.display = el.classList.contains('open') ? 'block' : 'none'; }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('show'); }

function loadDate(date){
  currentDate = date;
  if(window.innerWidth <= 768){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }
  document.querySelectorAll('.sb-date').forEach(el => { el.classList.toggle('active', el.getAttribute('onclick') === "loadDate('"+date+"')"); });
  const raw = HISTORY[date];
  if(!raw){ showNoData('No data found for this date.'); return; }
  const feedback = (raw.feedback||[]).filter(isValidFeedback);
  const participation = (raw.participation||[]).filter(isValidParticipation);
  const stats = recalcStats(feedback, participation, raw.stats||{});
  document.getElementById('hdr-date').textContent = date;
  const dlBtn = document.getElementById('dl-btn'); if(dlBtn) dlBtn.style.display='flex';
  resolvedItems = (raw.resolved||[]).map(r => ({ cat: r.category, text: r.issueText, who: r.studentName+' \u00B7 '+r.university, note: r.resolutionNote, date: r.date ? r.date.slice(5) : '\u2014' }));
  renderReport(feedback, participation, stats);
  renderResolvedSection();
  hideResolvedFlags();
}

// FIX 2 APPLIED: uses setAttribute('data-resolved') instead of style.display
function hideResolvedFlags(){
  if(!resolvedItems.length) return;
  const keys = new Set(resolvedItems.map(r => (r.cat||'').toLowerCase().trim() + '|' + (r.text||'').toLowerCase().trim()));
  document.querySelectorAll('.flag-item').forEach(el => {
    const cat = (el.querySelector('.flag-cat')?.textContent||'').toLowerCase().trim();
    const text = (el.querySelector('.flag-text')?.textContent||'').toLowerCase().trim();
    if(keys.has(cat + '|' + text)) el.setAttribute('data-resolved', 'true');
  });
}

function recalcStats(feedback, participation, storedStats) {
  if(feedback.length === 0) return storedStats;
  const catKeys = ['tv','audio','internet','ac','benches'];
  const funcFields = {tv:'functioning',audio:'functioning',internet:'available',ac:'comfortable',benches:'sockets'};
  const ratingNum = v => ({excellent:4,good:3,average:2,poor:1}[String(v||'').toLowerCase()]||0);
  const categories = {};
  let flagCount = 0;
  catKeys.forEach(k => {
    const ratings = feedback.map(f => ratingNum(f[k]?.rating)).filter(v=>v>0);
    const avg = ratings.length ? ratings.reduce((a,b)=>a+b,0)/ratings.length : 0;
    const ff = funcFields[k];
    const funcResp = feedback.filter(f => f[k]?.[ff]);
    const funcPct = funcResp.length ? Math.round(funcResp.filter(f=>String(f[k][ff]).trim()==='Yes').length/funcResp.length*100) : 0;
    const poor = feedback.filter(f => String(f[k]?.rating||'').trim()==='Poor' || String(f[k]?.[ff]||'').trim()==='No' || (k==='internet' && String(f[k]?.issues||'').trim()==='Yes')).length;
    flagCount += poor;
    categories[k] = {avgRating: Math.round(avg*10)/10, functioning: funcPct, poorCount: poor};
  });
  const overalls = feedback.map(f=>f.overall).filter(v=>v>0);
  return { totalResponses: feedback.length, uniCount: [...new Set(feedback.map(f=>f.university))].length, avgOverall: overalls.length ? Math.round(overalls.reduce((a,b)=>a+b,0)/overalls.length*10)/10 : 0, flagCount, totalStudents: participation.length, submitted: participation.filter(p=>p.status==='Submitted').length, notOpened: participation.filter(p=>p.status==='Untracked').length, categories };
}

function showNoData(msg){ document.getElementById('hdr-date').textContent = '\u2014'; document.getElementById('main-content').innerHTML = '<div class="no-data"><div class="no-data-icon">\uD83D\uDCED</div><div class="no-data-title">No data</div><div class="no-data-sub">'+msg+'</div></div>'; }

function renderReport(FEEDBACK, PARTICIPATION, STATS){
  currentFeedback = FEEDBACK;
  if(FEEDBACK.length === 0){ document.getElementById('main-content').innerHTML = '<div class="no-data" style="padding-top:60px"><div class="no-data-icon">\uD83D\uDCED</div><div class="no-data-title">No responses this week</div><div class="no-data-sub">Either the workflow hasn\'t run yet,<br>or no valid submissions were received.</div></div>'; return; }
  const cats = STATS.categories || {};
  const catCards = Object.keys(CAT_NAMES).map(k => {
    const c = cats[k]||{avgRating:0,functioning:0,poorCount:0};
    const col = c.avgRating > 0 ? ratingColor(c.avgRating) : 'var(--dim)';
    const pct = Math.round((c.avgRating/4)*100);
    const funcCol = c.functioning>=80?'var(--green)':c.functioning>=50?'var(--amber)':'var(--red)';
    return '<div class="cat-card" data-cat="'+k+'" onclick="filterByCategory(\''+k+'\')"><div class="cat-name" style="color:'+col+'">'+CAT_NAMES[k]+'</div><div class="cat-row"><span class="cat-label">Avg Rating</span><span class="cat-value" style="color:'+col+'">'+(c.avgRating||'\u2014')+'</span></div><div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div><div class="cat-row"><span class="cat-label">Functioning</span><span class="cat-value" style="color:'+funcCol+'">'+c.functioning+'%</span></div>'+(c.poorCount?'<div class="cat-row"><span class="cat-label">Issues</span><span class="cat-value" style="color:var(--red)">'+c.poorCount+'</span></div>':'')+'</div>';
  }).join('');

  const flags = [];
  FEEDBACK.forEach(f => {
    Object.keys(CAT_NAMES).forEach(k => {
      const c = f[k]; if(!c) return;
      const isPoor = String(c.rating||'').trim()==='Poor';
      const notWorking = ['functioning','comfortable','maintained','sockets','available'].some(ff => String(c[ff]||'').trim()==='No');
      const hasIssue = k==='internet' && String(c.issues||'').trim()==='Yes';
      if(isPoor || notWorking || hasIssue){
        const rawText = c.suggestion || c.issues_text || (isPoor?'Rated Poor':'Not functioning');
        const text = String(rawText).trim();
        if(text.length < 2 || /^(na|n\/a|none|no|yes|ok|fine|good|nothing|nope|noo|nah|not|nil|null|-|\.)$/i.test(text)) return;
        flags.push({cat:CAT_NAMES[k], text: esc(text), who:esc(f.student)+' \u00B7 '+esc(f.university)+' \u00B7 Room '+esc(f.classroom)});
      }
    });
  });

  const flagCats = [...new Set(flags.map(f=>f.cat))];
  const flagFilterBtns = flagCats.map(c=>'<button class="flag-filter-btn" onclick="filterFlags(\''+c+'\',this)">'+c+' <span style="opacity:.6">'+flags.filter(f=>f.cat===c).length+'</span></button>').join('');
  const flagsHtml = flags.length === 0
    ? '<div class="empty-state"><div class="empty-state-icon">\u2705</div><div class="empty-state-title">No issues flagged</div>All facilities rated satisfactorily this week.</div>'
    : '<div class="flag-wrap"><div class="flag-filters"><button class="flag-filter-btn active" onclick="filterFlags(\'all\',this)">All <span style="opacity:.6">'+flags.length+'</span></button>'+flagFilterBtns+'</div><div class="flag-list">'+flags.map((f,i)=>'<div class="flag-item" data-cat="'+f.cat+'" id="flag-'+i+'" data-idx="'+i+'"><span class="flag-cat">'+f.cat+'</span><span class="flag-text">'+f.text+'</span><span class="flag-who">'+f.who+'</span><button class="resolve-btn" onclick="openResolveModal(this)">Resolve</button></div>').join('')+'</div></div><div class="resolve-overlay" id="resolve-overlay" style="display:none" onclick="if(event.target===this)closeResolveModal()"><div class="resolve-modal"><div class="resolve-modal-hdr"><div class="resolve-modal-title">Resolve Issue</div><button class="resolve-modal-close" onclick="closeResolveModal()">\u2715</button></div><div class="resolve-modal-body"><div class="resolve-label">Issue Reported</div><div class="resolve-issue-box" id="resolve-issue-box"></div><div class="resolve-label">Resolution Note <span style="font-weight:400;color:#a78bfa;font-size:9px">(sent to student)</span></div><textarea class="resolve-input" id="resolve-note" rows="3" placeholder="e.g. New WiFi router installed in Room 207..."></textarea></div><div class="resolve-modal-footer"><button class="resolve-cancel" onclick="closeResolveModal()">Cancel</button><button class="resolve-send" id="resolve-send-btn" onclick="sendResolution()">Send Resolution Email \u2192</button></div></div></div>';

  const activeUnis = [...new Set(FEEDBACK.map(f=>f.university).filter(Boolean))].sort();
  const uniOptions = activeUnis.map(u=>'<option value="'+u+'">'+esc(u)+'</option>').join('');
  const respHtml = '<div class="filter-row"><select class="uni-select" id="uni-filter" onchange="filterResponses()"><option value="all">All Universities ('+activeUnis.length+')</option>'+uniOptions+'</select><button class="uni-select" id="late-toggle" onclick="toggleLate()" style="cursor:pointer;white-space:nowrap;color:var(--sub)" title="Show only responses submitted after Saturday">\u23F1 Late only</button><div class="search-wrap"><span class="search-ico"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span><input class="search-input" id="search" placeholder="Search student, classroom\u2026" oninput="filterResponses()"/></div></div><div id="resp-out"></div>';

  let partHtml = '';
  if(PARTICIPATION.length === 0){
    partHtml = '<div class="empty-state"><div class="empty-state-icon">\uD83D\uDCE7</div><div class="empty-state-title">No tracking data</div>Email tracking data will appear here after the 11 AM workflow runs.</div>';
  } else {
    const uniGroups = {};
    PARTICIPATION.forEach(p => { const u = p.university || 'Unknown'; if(!uniGroups[u]) uniGroups[u] = []; uniGroups[u].push(p); });
    const submissionCounts = {};
    FEEDBACK.forEach(f => { const key = normaliseKey(f.email || f.student); submissionCounts[key] = (submissionCounts[key]||0) + 1; });
    partHtml = Object.entries(uniGroups).sort(([a],[b])=>a.localeCompare(b)).map(([uni, students]) => {
      const total = students.length;
      const submitted = students.filter(s=>s.status==='Submitted').length;
      const notOpened = students.filter(s=>s.status==='Untracked').length;
      const rows = students.map(p => {
        const scls = p.status==='Submitted'?'st-sub':p.status==='Opened only'?'st-op':'st-no';
        const key = normaliseKey(p.email||p.name);
        const subCount = submissionCounts[key]||0;
        const studentFeedback = FEEDBACK.filter(f => normaliseKey(f.email||f.student) === normaliseKey(p.email||p.name));
        const hasFeedback = studentFeedback.length > 0;
        return '<div class="p-row" onclick="showStudentDetail('+JSON.stringify(JSON.stringify({name:p.name,uni,sentAt:p.sentAt||'\u2014',openedAt:p.openedAt,status:p.status,subCount,feedback:studentFeedback}))+')">'+'<div class="p-av" style="background:'+(hasFeedback?'var(--green-bg)':'var(--surface2)')+';color:'+(hasFeedback?'var(--green)':'var(--dim)')+'">'+initials(p.name)+'</div>'+'<div class="p-info"><div class="p-name">'+esc(p.name)+'</div><div class="p-meta"><span>\uD83D\uDCE7 Sent '+esc(p.sentAt||'\u2014')+'</span>'+(p.openedAt&&p.openedAt!=='\u2014'?'<span>\uD83D\uDC41 Opened '+esc(p.openedAt)+'</span>':'')+(subCount>0?'<span>\uD83D\uDCDD '+subCount+' submission'+(subCount>1?' (duplicate)':'')+'</span>':'')+'</div></div><span class="st '+scls+'">'+p.status+'</span></div>';
      }).join('');
      return '<div class="uni-group"><div class="uni-group-header" onclick="toggleUniGroup(this)"><div class="uni-group-title"><span class="uni-group-chevron">\u25B6</span>'+esc(uni)+'</div><div class="uni-group-stats"><span style="color:var(--green)">'+submitted+' submitted</span><span>\u00B7</span><span>'+total+' total</span>'+(notOpened>0?'<span>\u00B7 <span style="color:var(--amber)">'+notOpened+' not opened</span></span>':'')+'</div></div><div class="uni-group-body">'+rows+'</div></div>';
    }).join('');
  }

  lateOnly = false;
  const wd = wkDelta(currentDate, STATS);
  const heatmapHtml = buildHeatmap(FEEDBACK);

  document.getElementById('main-content').innerHTML =
    '<div class="sec-label">Overview</div>'+
    '<div class="kpi-grid">'+
      '<div class="kpi"><div class="kpi-ico" style="background:var(--blue-bg)"><svg viewBox="0 0 24 24" stroke="var(--blue)" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div><div class="kpi-val" style="color:var(--blue)">'+STATS.totalResponses+wd.responses+'</div><div class="kpi-lbl">Responses</div></div></div>'+

      '<div class="kpi"><div class="kpi-ico" style="background:var(--red-bg)"><svg viewBox="0 0 24 24" stroke="var(--red)" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div><div class="kpi-val" style="color:var(--red)">'+STATS.flagCount+wd.flags+'</div><div class="kpi-lbl">Issues Flagged</div></div></div>'+
      '<div class="kpi"><div class="kpi-ico" style="background:var(--amber-bg)"><svg viewBox="0 0 24 24" stroke="var(--amber)" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div><div><div class="kpi-val" style="color:var(--amber)">'+STATS.notOpened+'</div><div class="kpi-lbl">Untracked</div></div></div>'+
      '<div class="kpi" id="resolved-kpi"><div class="kpi-ico" style="background:var(--green-bg)"><svg viewBox="0 0 24 24" stroke="var(--green)" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div><div class="kpi-val" style="color:var(--green)" id="resolved-kpi-val">0</div><div class="kpi-lbl">Resolved</div></div></div>'+

    flagsHtml+

    '<div class="sec-label" id="resp-section" style="display:flex;align-items:center;justify-content:space-between;"><span>Individual Responses</span><div id="cat-filter-label" style="display:none;align-items:center;gap:6px;font-size:10px;background:var(--blue-bg);color:var(--blue);padding:3px 10px;border-radius:6px;font-weight:600"><span></span><span onclick="filterByCategory(activeCatFilter)" style="cursor:pointer;opacity:.7">\u2715 clear</span></div></div>'+
    respHtml+
    '<div class="sec-label">Student Participation</div>'+

  setTimeout(filterResponses, 0);
}

let activeCatFilter = null;

function filterByCategory(cat){
  const cards = document.querySelectorAll('.cat-card');
  if(activeCatFilter === cat){
    activeCatFilter = null;
    cards.forEach(c => c.classList.remove('active'));
    document.getElementById('cat-filter-label').style.display = 'none';
    document.querySelectorAll('.resp-item').forEach(el => el.classList.remove('resp-item-highlight'));
  } else {
    activeCatFilter = cat;
    cards.forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
    const catNames = {tv:'TV',audio:'Audio',video:'Video',internet:'Internet/Wi-Fi',ac:'AC',benches:'Benches & Power',washrooms:'Washrooms'};
    const label = document.getElementById('cat-filter-label');
    label.style.display = 'flex';
    label.querySelector('span').textContent = 'Highlighting: ' + catNames[cat];
    document.querySelectorAll('.resp-item').forEach(el => { el.classList.toggle('resp-item-highlight', el.dataset.cat === cat); });
    document.getElementById('resp-section').scrollIntoView({behavior:'smooth', block:'start'});
  }
}

function filterResponses(){
  const uni = (document.getElementById('uni-filter')||{}).value || 'all';
  const q   = ((document.getElementById('search')||{}).value||'').toLowerCase();
  const out = document.getElementById('resp-out');
  if(!out) return;
  const filtered = currentFeedback.filter(f => (uni==='all' || f.university===uni) && (!q || [f.student,f.university,f.classroom].some(v=>String(v||'').toLowerCase().includes(q))) && (!lateOnly || isLate(f)));
  if(!filtered.length){ out.innerHTML='<div class="empty-state"><div class="empty-state-icon">\uD83D\uDD0D</div><div class="empty-state-title">No matches</div>Try a different filter or search term.</div>'; return; }
  out.innerHTML = filtered.map(f => {
    const cats = Object.keys(CAT_NAMES).map(k=>{ const c=f[k]; if(!c) return ''; return '<div class="resp-item" data-cat="'+k+'"><span>'+CAT_NAMES[k]+'</span><span class="chip '+chipCls(c.rating)+'">'+(c.rating||'\u2014')+'</span></div>'; }).join('');
    const oc = f.overall>=4?'chip-e':f.overall>=3?'chip-g':f.overall>=2?'chip-a':'chip-p';
    const sub = subDate(f) ? ' \u00B7 <span style="color:'+(isLate(f)?'var(--amber)':'var(--dim)')+';font-weight:'+(isLate(f)?'600':'400')+'">'+(isLate(f)?'\u23F1 Late \u00B7 ':'')+fmtSub(f)+'</span>' : '';
    return '<div class="resp-card"><div class="resp-top"><div><div class="resp-name">'+esc(f.student)+'</div><div class="resp-meta">'+esc(f.university)+' \u00B7 Room '+esc(f.classroom)+sub+'</div></div><span class="chip '+oc+'">'+f.overall+'/5</span></div><div class="resp-grid">'+cats+'</div></div>';
  }).join('');
  if(activeCatFilter){ document.querySelectorAll('.resp-item').forEach(el => { el.classList.toggle('resp-item-highlight', el.dataset.cat === activeCatFilter); }); }
  renderResolvedSection();
}

    }).join('');

function downloadReport(){
  const d = HISTORY[currentDate]; if(!d) return;
  const feedback = (d.feedback||[]).filter(isValidFeedback);
  const stats = recalcStats(feedback, d.participation||[], d.stats||{});
  const catKeys = ['tv','audio','internet','ac','benches'];
  const catNames = {tv:'TV',audio:'Audio',internet:'Internet / Wi-Fi',ac:'AC',benches:'Benches & Power'};
  const funcFields = {tv:'functioning',audio:'functioning',internet:'available',ac:'comfortable',benches:'sockets'};
  const rn = v => ({excellent:4,good:3,average:2,poor:1}[String(v||'').toLowerCase()]||0);
  const uniGroups = {}; feedback.forEach(f => { const u = f.university||'Unknown'; if(!uniGroups[u]) uniGroups[u] = []; uniGroups[u].push(f); });
  function uniCatStats(ufb){ const res = {}; catKeys.forEach(k => { const ratings = ufb.map(f=>rn(f[k]?.rating)).filter(v=>v>0); const avg = ratings.length ? Math.round(ratings.reduce((a,b)=>a+b,0)/ratings.length*10)/10 : 0; const ff = funcFields[k]; const fr = ufb.filter(f=>f[k]?.[ff]); const fp = fr.length ? Math.round(fr.filter(f=>String(f[k][ff]).trim()==='Yes').length/fr.length*100) : 0; const poor = ufb.filter(f=>String(f[k]?.rating||'').trim()==='Poor'||String(f[k]?.[ff]||'').trim()==='No'||(k==='internet'&&String(f[k]?.issues||'').trim()==='Yes')).length; res[k] = {avg, fp, poor}; }); return res; }
  function uniFlags(ufb){ const flags = []; ufb.forEach(f => { catKeys.forEach(k => { const c = f[k]; if(!c) return; const ff = funcFields[k]; const isPoor = String(c.rating||'').trim()==='Poor'; const notWorking = String(c[ff]||'').trim()==='No'; const hasIssue = k==='internet' && String(c.issues||'').trim()==='Yes'; if(isPoor||notWorking||hasIssue){ const raw = c.suggestion || c.issues_text || (isPoor?'Rated Poor':notWorking?'Not functioning':'Issue reported'); const clean = String(raw).trim(); if(clean.length>=2 && !/^(na|n\/a|none|no|yes|ok|fine|good|nothing|nope|noo|nah|not|nil|null|-|\.)$/i.test(clean)){ flags.push({cat:catNames[k], text:clean, who:f.student+' \u00B7 Room '+f.classroom, len:clean.length}); } } }); }); const seen = new Set(); return flags.sort((a,b)=>b.len-a.len).filter(f=>{ const key = f.who + '|' + f.cat; if(seen.has(key)) return false; seen.add(key); return true; }); }
  function uniSummary(uni, ufb, uStats){ const overalls = ufb.map(f=>f.overall).filter(v=>v>0); const avg = overalls.length ? Math.round(overalls.reduce((a,b)=>a+b,0)/overalls.length*10)/10 : 0; const worst = catKeys.reduce((a,b) => { const pa = uStats[a]?.poor||0, pb = uStats[b]?.poor||0; if(pb !== pa) return pb > pa ? b : a; return (uStats[b]?.avg||4) < (uStats[a]?.avg||4) ? b : a; }); const best = catKeys.reduce((a,b) => (uStats[a]?.avg||0) > (uStats[b]?.avg||0) ? a : b); const worstFlags = uStats[worst]?.poor||0; return ufb.length+' responses this week. '+catNames[worst]+' is the most critical concern with '+worstFlags+' flag'+(worstFlags!==1?'s':'')+' and an avg rating of '+(uStats[worst]?.avg||'\u2014')+'/4. '+catNames[best]+' is performing best at '+(uStats[best]?.avg||'\u2014')+'/4. Overall student satisfaction is '+avg+'/5.'; }
  const uniSections = Object.entries(uniGroups).sort().map(([uni, ufb]) => { const uStats = uniCatStats(ufb); const flags = uniFlags(ufb); const summary = uniSummary(uni, ufb, uStats); const catRows = catKeys.map(k => { const cs = uStats[k]; return '<tr><td style="padding:10px;border-bottom:0.5px solid #e5e7eb;font-size:12px">'+catNames[k]+'</td><td style="padding:10px;border-bottom:0.5px solid #e5e7eb;font-size:12px">'+(cs.avg||'\u2014')+' / 4</td><td style="padding:10px;border-bottom:0.5px solid #e5e7eb;font-size:12px">'+cs.fp+'%</td><td style="padding:10px;border-bottom:0.5px solid #e5e7eb;font-size:12px">'+(cs.poor||'\u2014')+'</td></tr>'; }).join(''); const flagRows = flags.length === 0 ? '<p style="font-size:12px;color:#9ca3af;padding:8px 0">No issues flagged.</p>' : flags.map((f,i) => '<div style="display:flex;gap:14px;padding:10px 0;border-bottom:0.5px solid #f3f4f6;font-size:12px;line-height:1.5"><span style="color:#9ca3af;min-width:16px;font-weight:500">'+(i+1)+'</span><span style="font-weight:500;min-width:100px;color:#111827">'+f.cat+'</span><div style="flex:1"><div style="color:#111827">'+f.text+'</div><div style="font-size:11px;color:#9ca3af;margin-top:2px">'+f.who+'</div></div></div>').join(''); return '<div style="margin-bottom:32px"><div style="font-size:17px;font-weight:500;color:#111827;margin-bottom:8px">'+uni+'</div><div style="font-size:12px;color:#6b7280;line-height:1.6;padding:10px 14px;background:#f9fafb;border-radius:8px;margin-bottom:16px">'+summary+'</div><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:6px">Category Ratings</div><table style="width:100%;border-collapse:collapse;margin-bottom:20px"><tr style="background:#f9fafb"><th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:500;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid #e5e7eb">Category</th><th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:500;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid #e5e7eb">Avg Rating</th><th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:500;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid #e5e7eb">Functioning</th><th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:500;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid #e5e7eb">Issues</th></tr>'+catRows+'</table><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:6px">Flagged Issues</div><div style="margin-bottom:8px">'+flagRows+'</div></div>'; }).join('<hr style="border:none;border-top:1px solid #e5e7eb;margin:4px 0 28px"/>');
  const overallAvg = stats.avgOverall||'\u2014';
  const reportHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Facilities Feedback Report - '+currentDate+'</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#fff;color:#111827;padding:40px 48px;max-width:720px;margin:0 auto;line-height:1.5}@media print{body{padding:20mm} @page{margin:20mm} .no-print{display:none}}</style></head><body><div style="display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:20px;border-bottom:2px solid #111827;margin-bottom:28px"><div><div style="font-size:22px;font-weight:500;color:#111827;margin-bottom:6px">Facilities Feedback Report</div><div style="font-size:13px;color:#6b7280;line-height:1.8">Saturday, '+currentDate+'<br>NIAT Program Operations<br>Generated automatically</div></div><img src="https://raw.githubusercontent.com/programopscentral-art/infra-reports/main/niat-logo.png" style="width:48px;height:48px;border-radius:8px;object-fit:cover"/></div><div style="display:grid;grid-template-columns:repeat(4,1fr);border:0.5px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:36px"><div style="padding:14px 12px;text-align:center;border-right:0.5px solid #e5e7eb"><div style="font-size:22px;font-weight:500;color:#111827">'+stats.totalResponses+'</div><div style="font-size:10px;color:#9ca3af;margin-top:5px;text-transform:uppercase;letter-spacing:.06em">Responses</div></div><div style="padding:14px 12px;text-align:center;border-right:0.5px solid #e5e7eb"><div style="font-size:22px;font-weight:500;color:#111827">'+overallAvg+'/5</div><div style="font-size:10px;color:#9ca3af;margin-top:5px;text-transform:uppercase;letter-spacing:.06em">Avg Rating</div></div><div style="padding:14px 12px;text-align:center;border-right:0.5px solid #e5e7eb"><div style="font-size:22px;font-weight:500;color:#111827">'+stats.flagCount+'</div><div style="font-size:10px;color:#9ca3af;margin-top:5px;text-transform:uppercase;letter-spacing:.06em">Issues</div></div><div style="padding:14px 12px;text-align:center"><div style="font-size:22px;font-weight:500;color:#111827">'+stats.uniCount+'</div><div style="font-size:10px;color:#9ca3af;margin-top:5px;text-transform:uppercase;letter-spacing:.06em">Universities</div></div></div>'+uniSections+'<div style="text-align:center;font-size:10px;color:#9ca3af;padding-top:16px;border-top:0.5px solid #e5e7eb;margin-top:8px">NIAT Facilities Feedback \u00A0\u00B7\u00A0 Confidential \u00A0\u00B7\u00A0 '+currentDate+'</div></body></html>';
  const win = window.open('', '_blank'); win.document.write(reportHtml); win.document.close(); setTimeout(() => win.print(), 800);
}

const RESOLVE_WEBHOOK = 'https://niat2026.app.n8n.cloud/webhook/resolve';
let currentResolveFlag = null;
let currentResolveFeedback = null;
let resolvedItems = [];

function renderResolvedSection(){
  const kpiVal = document.getElementById('resolved-kpi-val');
  if(kpiVal) kpiVal.textContent = resolvedItems.length;
  const label  = document.getElementById('resolved-sec-label');
  const inline = document.getElementById('resolved-inline');
  if(!inline) return;
  if(resolvedItems.length === 0){ if(label) label.style.display = 'none'; inline.innerHTML = ''; return; }
  if(label) label.style.display = 'block';
  inline.innerHTML = '<div class="resolved-section"><div class="resolved-section-header">\u2705 Resolved Issues</div><div id="resolved-items-list">'+resolvedItems.map(item => '<div class="resolved-item"><span class="resolved-cat-tag">'+item.cat+'</span><span class="flag-text" style="flex:1">'+item.text+'</span><span class="resolved-date">\u2705 '+item.date+'</span><span class="flag-who" style="width:100%">'+item.who+'</span><span style="font-size:10px;color:#059669;width:100%;margin-top:2px">Resolution: '+item.note+'</span></div>').join('')+'</div></div>';
}

function openResolveModal(btn){
  const flagEl = btn.closest('.flag-item');
  const idx = parseInt(flagEl.dataset.idx);
  currentResolveFlag = idx;
  const cat = flagEl.querySelector('.flag-cat').textContent;
  const text = flagEl.querySelector('.flag-text').textContent;
  const who = flagEl.querySelector('.flag-who').textContent;
  const parts = who.split(' \u00B7 ');
  const studentName = parts[0]||'';
  const university = parts[1]||'';
  const room = parts[2]||'';
  const student = currentFeedback.find(f => (f.student||'').toLowerCase().trim() === studentName.toLowerCase().trim());
  currentResolveFeedback = { studentName, university, room, studentEmail: student?.email||'', category: cat, issueText: text, weekDate: currentDate };
  document.getElementById('resolve-issue-box').innerHTML = '<strong>'+cat+'</strong> \u2014 '+text+'<br><span style="font-size:10px;color:#9ca3af;margin-top:4px;display:block">'+who+'</span>';
  document.getElementById('resolve-note').value = '';
  document.getElementById('resolve-overlay').style.display = 'flex';
}

function closeResolveModal(){ document.getElementById('resolve-overlay').style.display = 'none'; currentResolveFlag = null; currentResolveFeedback = null; }

async function sendResolution(){
  const note = document.getElementById('resolve-note').value.trim();
  if(!note){ document.getElementById('resolve-note').style.borderColor='#dc2626'; return; }
  document.getElementById('resolve-note').style.borderColor='#ede9fe';
  const btn = document.getElementById('resolve-send-btn');
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const payload = { ...currentResolveFeedback, resolutionNote: note };
    const res = await fetch(RESOLVE_WEBHOOK, { method: 'POST', mode: 'cors', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const flagEl = document.getElementById('flag-' + currentResolveFlag);
    if(true){
      if(flagEl){
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-IN', {day:'numeric',month:'short',timeZone:'Asia/Calcutta'});
        flagEl.style.display = 'none';
        const rCat = flagEl.querySelector('.flag-cat').textContent;
        const rText = flagEl.querySelector('.flag-text').textContent;
        const rWho = flagEl.querySelector('.flag-who').textContent;
        resolvedItems.push({cat:rCat, text:rText, who:rWho, note:note, date:dateStr});
        renderResolvedSection();
      }
      closeResolveModal();
    } else { btn.textContent = 'Failed \u2014 Retry'; btn.disabled = false; }
  } catch(e) { btn.textContent = 'Failed \u2014 Retry'; btn.disabled = false; }
}

function toggleTheme(){
  const dark = document.documentElement.dataset.theme==='dark';
  document.documentElement.dataset.theme = dark?'light':'dark';
}

buildSidebar();

if(validDates.length) loadDate(validDates[0]);
