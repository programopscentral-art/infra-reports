<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Facilities Feedback Report</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#f5f3ff;--surface:#fff;--surface2:#f5f3ff;--border:#ede9fe;--text:#1e1b4b;--sub:#6d28d9;--dim:#8b5cf6;--red:#dc2626;--amber:#d97706;--green:#059669;--blue:#4f46e5;--red-bg:#fef2f2;--amber-bg:#fffbeb;--green-bg:#d1fae5;--blue-bg:#ede9fe;--purple:#4f46e5;--purple-dark:#1e1b4b;--purple-light:#ede9fe;--purple-mid:#6d28d9;--shadow:0 2px 8px rgba(79,70,229,.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.layout{display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:220px;background:#1e1b4b;border-right:none;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;padding:0;flex-shrink:0;z-index:50;transition:transform .2s;display:flex;flex-direction:column}
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:8px}
.sidebar-title{font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px}
.sidebar-logo{width:30px;height:30px;background:#4f46e5;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-sub{font-size:9px;color:#a5b4fc;margin-top:2px;padding-left:40px}
.sb-section{padding:0 10px;margin-bottom:4px}
.sb-year{font-size:10px;font-weight:600;color:#a5b4fc;padding:5px 8px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:6px}
.sb-year:hover,.sb-year.open{color:#c7d2fe}
.sb-year svg{width:10px;height:10px;transition:transform .15s;stroke:currentColor;fill:none;stroke-width:2}
.sb-year.open svg{transform:rotate(90deg)}
.sb-months{display:block;padding-left:8px}
.sb-month{font-size:10px;font-weight:600;color:#818cf8;padding:4px 8px;cursor:pointer;border-radius:5px;margin-top:2px}
.sb-month:hover,.sb-month.open{color:#c7d2fe}
.sb-dates{display:block;padding-left:8px}
.sb-date{font-size:11px;color:#c7d2fe;padding:6px 10px;cursor:pointer;border-radius:8px;transition:all .1s;display:flex;align-items:center;justify-content:space-between;margin:2px 0}
.sb-date:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-date.active{background:#4f46e5;color:#fff;font-weight:600}
.sb-date-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0}
.sb-date.active .sb-date-dot{background:#fff}
.sb-empty{font-size:11px;color:#818cf8;padding:16px;text-align:center;line-height:1.6}
.sb-date-count{font-size:9px;background:rgba(255,255,255,.15);padding:1px 6px;border-radius:4px;color:#c7d2fe}
/* HEADER */
.header{background:#fff;border-bottom:1px solid #ede9fe;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(79,70,229,.06)}
.header-left{display:flex;align-items:center;gap:10px}
.menu-btn{display:none;width:32px;height:32px;border-radius:8px;border:1px solid #ede9fe;background:#f5f3ff;color:#6d28d9;cursor:pointer;align-items:center;justify-content:center;font-size:16px}
.brand-name{font-size:14px;font-weight:700;color:#1e1b4b}
.brand-date{font-size:10px;color:#7c3aed;font-weight:500;margin-top:1px}
.theme-btn{display:none}
.dl-btn{display:none;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:none;background:#1e1b4b;color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.dl-btn:hover{background:#2d2a6e}
.dl-btn svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2;flex-shrink:0}
/* MAIN */
.main-wrap{margin-left:220px;flex:1;min-width:0;background:#f5f3ff}
.main{padding:20px 20px 48px;max-width:780px;margin:0 auto}
.sec-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#7c3aed;font-weight:600;margin:22px 0 10px}
/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;background:#fff;border:1px solid #ede9fe;border-radius:14px;color:#8b5cf6;font-size:12px;line-height:1.8}
.empty-state-icon{font-size:28px;margin-bottom:8px}
.empty-state-title{font-size:13px;font-weight:600;color:#6d28d9;margin-bottom:4px}
/* NO DATA SCREEN */
.no-data{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;color:#8b5cf6}
.no-data-icon{font-size:40px;margin-bottom:16px;opacity:.4}
.no-data-title{font-size:15px;font-weight:600;color:#4f46e5;margin-bottom:6px}
.no-data-sub{font-size:12px;line-height:1.6;color:#7c3aed}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.kpi{background:#fff;border:1px solid #ede9fe;border-radius:14px;padding:14px 15px;display:flex;align-items:center;gap:11px;box-shadow:0 2px 8px rgba(79,70,229,.06)}
.kpi-ico{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.kpi-ico svg{width:16px;height:16px;stroke-width:1.75;fill:none}
.kpi-val{font-size:22px;font-weight:700;line-height:1;color:#1e1b4b}
.kpi-lbl{font-size:9px;color:#7c3aed;margin-top:3px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
/* CATEGORY CARDS */
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.cat-card{background:#fff;border:1px solid #ede9fe;border-top:3px solid #4f46e5;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(79,70,229,.06);cursor:pointer;transition:all .15s}
.cat-card:hover{box-shadow:0 4px 16px rgba(79,70,229,.14);transform:translateY(-1px)}
.cat-card.active{border-color:#4f46e5;background:#f5f3ff;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.cat-name{font-size:12px;font-weight:700;color:#1e1b4b;margin-bottom:8px}
.cat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-label{font-size:10px;color:#8b5cf6}
.cat-value{font-size:12px;font-weight:700}
.bar-wrap{height:5px;background:#ede9fe;border-radius:3px;overflow:hidden;margin:4px 0 8px;border:none}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
/* FLAGS */
.flag-wrap{background:#fff;border:1px solid #ede9fe;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(79,70,229,.06)}
.flag-filters{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid #ede9fe;flex-wrap:wrap;background:#faf9ff}
.flag-filter-btn{font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;border:1px solid #ede9fe;background:#fff;color:#6d28d9;cursor:pointer;transition:all .1s}
.flag-filter-btn:hover{background:#ede9fe}
.flag-filter-btn.active{background:#4f46e5;color:#fff;border-color:#4f46e5}
.flag-list{max-height:280px;overflow-y:auto}
.flag-item{padding:11px 14px;border-bottom:1px solid #f5f3ff;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.flag-item:last-child{border-bottom:none}
.flag-item.hidden{display:none}
.flag-cat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap;background:#fef2f2;color:#dc2626;flex-shrink:0}
.flag-text{font-size:12px;color:#374151;flex:1;min-width:120px}
.flag-who{font-size:10px;color:#8b5cf6;width:100%;padding-top:2px}
.resolve-btn{font-size:9px;font-weight:600;padding:3px 10px;border-radius:6px;border:none;background:#4f46e5;color:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Inter',sans-serif;transition:background .15s}
.resolved-section{background:#fff;border:1px solid #d1fae5;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(5,150,105,.06)}
.resolved-section-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f0fdf4;border-bottom:1px solid #d1fae5;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#065f46}
.resolved-item{padding:11px 14px;border-bottom:1px solid #f0fdf4;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.resolved-item:last-child{border-bottom:none}
.resolved-cat-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;background:#d1fae5;color:#065f46;white-space:nowrap;flex-shrink:0}
.resolved-date{font-size:9px;font-weight:600;padding:2px 7px;border-radius:5px;background:#f0fdf4;color:#059669;white-space:nowrap;flex-shrink:0;margin-left:auto}
.resolve-btn:hover{background:#4338ca}
.resolved-badge{font-size:9px;font-weight:600;padding:3px 10px;border-radius:6px;background:#d1fae5;color:#065f46;white-space:nowrap;flex-shrink:0}
.flag-item.resolved{opacity:.5}
.flag-item.resolved .flag-cat{background:#d1fae5;color:#065f46}
/* RESOLVE MODAL */
.resolve-overlay{position:fixed;inset:0;background:rgba(30,27,75,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.resolve-modal{background:#fff;border-radius:16px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 16px 48px rgba(79,70,229,.25)}
.resolve-modal-hdr{background:#1e1b4b;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.resolve-modal-title{font-size:13px;font-weight:700;color:#fff}
.resolve-modal-close{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.12);border:none;color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.resolve-modal-body{padding:16px 18px}
.resolve-issue-box{background:#fef2f2;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:#374151;line-height:1.5}
.resolve-label{font-size:10px;font-weight:600;color:#6d28d9;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.resolve-input{width:100%;border:1px solid #ede9fe;border-radius:8px;padding:9px 12px;font-size:12px;color:#1e1b4b;outline:none;font-family:'Inter',sans-serif;resize:none}
.resolve-input:focus{border-color:#4f46e5}
.resolve-modal-footer{padding:12px 18px;border-top:1px solid #ede9fe;display:flex;gap:8px;justify-content:flex-end}
.resolve-cancel{padding:7px 14px;border-radius:8px;border:1px solid #ede9fe;background:#fff;color:#6d28d9;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.resolve-send{padding:7px 14px;border-radius:8px;border:none;background:#4f46e5;color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.resolve-send:hover{background:#4338ca}
.resolve-send:disabled{opacity:.6;cursor:not-allowed}
/* RESPONSES */
.filter-row{display:flex;gap:8px;margin-bottom:10px}
.uni-select{background:#fff;border:1px solid #ede9fe;border-radius:8px;padding:8px 12px;font-size:12px;color:#1e1b4b;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 1px 4px rgba(79,70,229,.06)}
.search-wrap{position:relative;flex:1}
.search-input{width:100%;background:#fff;border:1px solid #ede9fe;border-radius:10px;color:#1e1b4b;font-size:13px;padding:10px 12px 10px 33px;outline:none}
.search-input::placeholder{color:#a78bfa}.search-input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.08)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#a78bfa}
.search-ico svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.resp-card{background:#fff;border:1px solid #ede9fe;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(79,70,229,.06)}
.resp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.resp-name{font-size:13px;font-weight:700;color:#1e1b4b}
.resp-meta{font-size:10px;color:#8b5cf6}
.resp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px}
.resp-item{font-size:10px;color:#6d28d9;display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f5f3ff;border-radius:4px;transition:all .15s}
.resp-item-highlight{background:#ede9fe;padding:3px 6px;border-bottom:1px solid #c4b5fd;font-weight:700;color:#4f46e5}
.chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px}
.chip-e{background:#d1fae5;color:#065f46}.chip-g{background:#ede9fe;color:#4338ca}.chip-a{background:#fffbeb;color:#92400e}.chip-p{background:#fef2f2;color:#991b1b}
/* PARTICIPATION */
.uni-group{background:#fff;border:1px solid #ede9fe;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 8px rgba(79,70,229,.06)}
.uni-group-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:background .1s;background:#faf9ff}
.uni-group-header:hover{background:#f5f3ff}
.uni-group-title{font-size:13px;font-weight:700;color:#1e1b4b;display:flex;align-items:center;gap:8px}
.uni-group-stats{display:flex;align-items:center;gap:8px;font-size:10px;color:#7c3aed;font-weight:500}
.uni-group-chevron{transition:transform .2s;color:#a78bfa;font-size:10px}
.uni-group-chevron.open{transform:rotate(90deg)}
.uni-group-body{display:none;border-top:1px solid #f0effe}
.uni-group-body.open{display:block}
.p-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f5f3ff;cursor:pointer;transition:background .1s}
.p-row:last-child{border-bottom:none}
.p-row:hover{background:#faf9ff}
.p-av{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.p-info{flex:1;min-width:0}
.p-name{font-size:12px;font-weight:600;color:#1e1b4b}
.p-meta{font-size:10px;color:#8b5cf6;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.p-submissions{font-size:10px;color:#7c3aed}
.st{font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;white-space:nowrap}
.st-sub{background:#d1fae5;color:#065f46}.st-op{background:#fffbeb;color:#92400e}.st-no{background:#f5f3ff;color:#7c3aed;border:1px solid #ede9fe}
/* STUDENT DETAIL MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(30,27,75,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(79,70,229,.25)}
.modal-header{padding:16px 20px;border-bottom:1px solid #ede9fe;display:flex;align-items:center;justify-content:space-between;background:#faf9ff}
.modal-title{font-size:14px;font-weight:700;color:#1e1b4b}
.modal-close{width:28px;height:28px;border-radius:7px;border:1px solid #ede9fe;background:#fff;color:#6d28d9;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.modal-body{overflow-y:auto;padding:16px 20px;flex:1}
.modal-section{margin-bottom:16px}
.modal-section-title{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#8b5cf6;font-weight:600;margin-bottom:8px}
.modal-cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.modal-cat{background:#f5f3ff;border:1px solid #ede9fe;border-radius:8px;padding:8px 10px}
.modal-cat-name{font-size:10px;font-weight:600;color:#7c3aed;margin-bottom:4px}
.modal-cat-rating{font-size:11px;font-weight:700}
.modal-cat-note{font-size:10px;color:#6d28d9;margin-top:3px;line-height:1.4}
.modal-overall{display:flex;align-items:center;gap:10px;background:#f5f3ff;border:1px solid #ede9fe;border-radius:8px;padding:10px 12px;margin-bottom:10px}
.modal-overall-num{font-size:24px;font-weight:700;color:#1e1b4b}
.footer{display:none}
/* MOBILE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:240px;z-index:100;box-shadow:4px 0 24px rgba(79,70,229,.3)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(30,27,75,.45);z-index:99}
  .sidebar-overlay.show{display:block}
  .main-wrap{margin-left:0}
  .menu-btn{display:flex}
  .header{padding:10px 14px;position:sticky;top:0;z-index:90}
  .brand-name{font-size:12px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:6px}
  .kpi{padding:11px 10px;gap:8px}
  .kpi-ico{width:30px;height:30px}
  .kpi-ico svg{width:13px;height:13px}
  .kpi-val{font-size:18px}
  .kpi-lbl{font-size:9px}
  .cat-grid{grid-template-columns:1fr 1fr;gap:6px}
  .cat-card{padding:12px}
  .resp-grid{grid-template-columns:1fr 1fr}
  .filter-row{flex-direction:column;gap:6px}
  .uni-select{width:100%}
  .main{padding:12px 12px 60px}
  .sec-label{margin:18px 0 8px}
  .sb-date{padding:8px 10px;font-size:12px}
  .sb-month{padding:6px 8px;font-size:11px}
  .sb-year{padding:7px 8px;font-size:12px}
}
@media(max-width:380px){
  .cat-grid{grid-template-columns:1fr}
  .resp-grid{grid-template-columns:1fr}
}
/* PDF BUTTON */

.pdf-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

</style>
</head>
<body>
<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title"><img src="https://raw.githubusercontent.com/programopscentral-art/infra-reports/main/niat-logo.png" style="width:30px;height:30px;border-radius:8px;object-fit:cover;background:#4f46e5" loading="eager" onerror="this.style.background='#4f46e5';this.style.display='block'"/>NIAT</div>
      <div class="sidebar-sub">Facilities Feedback</div>
    </div>
    <div id="sidebar-nav"></div>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-wrap">
    <div class="header">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div>
          <div class="brand-name">Facilities Feedback</div>
          <div class="brand-date" id="hdr-date">—</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="dl-btn" id="dl-btn" onclick="downloadReport()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download Report</button>
      </div>
    </div>
    <div class="main" id="main-content">
      <div class="no-data"><div class="no-data-icon">📋</div><div class="no-data-title">Select a date</div><div class="no-data-sub">Choose a Saturday from the sidebar<br>to view that week's feedback.</div></div>
    </div>

    
  </div>
  <div id="resolved-outer" style="display:none;margin-left:220px">
    <div style="padding:0 20px 40px;max-width:780px;margin:0 auto">
      <div class="sec-label">Resolved Issues</div>
      <div class="resolved-section" id="resolved-persistent">
        <div class="resolved-section-header">✅ Resolved Issues</div>
        <div id="resolved-items-list">
          <div style="padding:20px;text-align:center;font-size:12px;color:#8b5cf6">No issues resolved yet this session.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// DATA_START

const CAT_NAMES={tv:'TV',audio:'Audio',internet:'Internet/Wi-Fi',ac:'AC',benches:'Benches & Power'};
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentDate = null;
let currentFeedback = [];

// ── Data validation — filters out junk/test entries ───────────────
function isValidFeedback(f) {
  if (!f.student || f.student.trim().length < 2) return false;       // single char names like "a"
  if (!f.university || f.university.trim().length < 2) return false; // single char universities
  if (!f.email || !f.email.includes('@')) return false;              // missing or invalid email
  return true;
}

function isValidParticipation(p) {
  if (!p.name || p.name.trim().length < 2) return false;
  if (!p.university || p.university.trim().length < 2) return false;
  return true;
}

// ── Helpers ───────────────────────────────────────────────────────
function ratingColor(v){return v>=3.5?'var(--green)':v>=2.5?'var(--amber)':'var(--red)'}
function chipCls(v){const l=String(v||'').toLowerCase();return l==='excellent'?'chip-e':l==='good'?'chip-g':l==='average'?'chip-a':l==='poor'?'chip-p':'chip-g'}
function initials(n){return(n||'?').split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Sidebar ───────────────────────────────────────────────────────
function buildSidebar(){
  // Only show dates that have at least 1 valid feedback response
  const dates = Object.keys(HISTORY)
    .filter(d => {
      const h = HISTORY[d];
      return h && (h.feedback||[]).filter(isValidFeedback).length > 0;
    })
    .sort().reverse();

  if(!dates.length){
    document.getElementById('sidebar-nav').innerHTML='<div class="sb-empty">No reports yet.<br>Run the workflow on Saturday to generate one.</div>';
    return;
  }

  const tree = {};
  dates.forEach(d => {
    const [y,m] = d.split('-');
    if(!tree[y]) tree[y]={};
    const mName = MONTHS[parseInt(m)-1];
    if(!tree[y][mName]) tree[y][mName]=[];
    tree[y][mName].push(d);
  });

  let html = '';
  Object.keys(tree).sort().reverse().forEach(year => {
    html += `<div class="sb-section">`;
    html += `<div class="sb-year open" onclick="toggleSbYear(this)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>${year}</div>`;
    html += `<div class="sb-months" style="display:block">`;
    Object.keys(tree[year]).forEach(month => {
      html += `<div class="sb-month open" onclick="toggleSbMonth(this)">${month}</div>`;
      html += `<div class="sb-dates" style="display:block">`;
      tree[year][month].forEach(d => {
        const day = parseInt(d.split('-')[2]);
        const count = (HISTORY[d].feedback||[]).filter(isValidFeedback).length;
        html += `<div class="sb-date" onclick="loadDate('${d}')"><span>Sat ${day}</span><span class="sb-date-count">${count}</span></div>`;
      });
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('sidebar-nav').innerHTML = html;
}

function toggleSbYear(el){
  el.classList.toggle('open');
  const months = el.nextElementSibling;
  if(months) months.style.display = el.classList.contains('open') ? 'block' : 'none';
}
function toggleSbMonth(el){
  el.classList.toggle('open');
  const dates = el.nextElementSibling;
  if(dates) dates.style.display = el.classList.contains('open') ? 'block' : 'none';
}
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}

// ── Load date ─────────────────────────────────────────────────────
function loadDate(date){
  currentDate = date;
  if(window.innerWidth <= 768){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  }
  // Update active state
  document.querySelectorAll('.sb-date').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') === `loadDate('${date}')`);
  });

  const raw = HISTORY[date];
  if(!raw){ showNoData('No data found for this date.'); return; }

  // Validate and filter data before rendering
  const feedback     = (raw.feedback||[]).filter(isValidFeedback);
  const participation = (raw.participation||[]).filter(isValidParticipation);

  // Recalculate stats from validated feedback (don't trust stored stats if data was dirty)
  const stats = recalcStats(feedback, participation, raw.stats||{});

  document.getElementById('hdr-date').textContent = date;
  const dlBtn = document.getElementById('dl-btn'); if(dlBtn) dlBtn.style.display='flex';
  // Load resolved items from HISTORY into resolvedItems array
  resolvedItems = (raw.resolved||[]).map(r => ({
    cat: r.category,
    text: r.issueText,
    who: `${r.studentName} · ${r.university}`,
    note: r.resolutionNote,
    date: r.date ? r.date.slice(5) : '—'
  }));
  renderReport(feedback, participation, stats);
  renderResolvedSection();
  hideResolvedFlags();
}

// ── Hide flagged issues already resolved this week (match by cat+text) ──
function hideResolvedFlags(){
  if(!resolvedItems.length) return;
  const keys = new Set(resolvedItems.map(r =>
    (r.cat||'').toLowerCase().trim() + '|' + (r.text||'').toLowerCase().trim()
  ));
  document.querySelectorAll('.flag-item').forEach(el => {
    const cat = (el.querySelector('.flag-cat')?.textContent||'').toLowerCase().trim();
    const text = (el.querySelector('.flag-text')?.textContent||'').toLowerCase().trim();
    if(keys.has(cat + '|' + text)) el.style.display = 'none';
  });
}

// ── Recalculate stats from clean data ────────────────────────────
function recalcStats(feedback, participation, storedStats) {
  if(feedback.length === 0) return storedStats; // no responses, keep stored (zeros)
  const catKeys = ['tv','audio','internet','ac','benches'];
  const funcFields = {tv:'functioning',audio:'functioning',internet:'available',ac:'comfortable',benches:'sockets'};
  const ratingNum = v => ({excellent:4,good:3,average:2,poor:1}[String(v||'').toLowerCase()]||0);

  const categories = {};
  let flagCount = 0;
  catKeys.forEach(k => {
    const ratings = feedback.map(f => ratingNum(f[k]?.rating)).filter(v=>v>0);
    const avg = ratings.length ? ratings.reduce((a,b)=>a+b,0)/ratings.length : 0;
    const ff = funcFields[k];
    const funcResp = feedback.filter(f => f[k]?.[ff]);
    const funcPct = funcResp.length ? Math.round(funcResp.filter(f=>String(f[k][ff]).trim()==='Yes').length/funcResp.length*100) : 0;
    const poor = feedback.filter(f =>
      String(f[k]?.rating||'').trim()==='Poor' ||
      String(f[k]?.[ff]||'').trim()==='No' ||
      (k==='internet' && String(f[k]?.issues||'').trim()==='Yes')
    ).length;
    flagCount += poor;
    categories[k] = {avgRating: Math.round(avg*10)/10, functioning: funcPct, poorCount: poor};
  });

  const overalls = feedback.map(f=>f.overall).filter(v=>v>0);
  return {
    totalResponses: feedback.length,
    uniCount: [...new Set(feedback.map(f=>f.university))].length,
    avgOverall: overalls.length ? Math.round(overalls.reduce((a,b)=>a+b,0)/overalls.length*10)/10 : 0,
    flagCount,
    totalStudents: participation.length,
    submitted: participation.filter(p=>p.status==='Submitted').length,
    notOpened: participation.filter(p=>p.status==='Untracked').length,
    categories
  };
}

  const cats = STATS.categories || {};

    const c = cats[k]||{avgRating:0,functioning:0,poorCount:0};
    const col = c.avgRating > 0 ? ratingColor(c.avgRating) : 'var(--dim)';
    const pct = Math.round((c.avgRating/4)*100);
    const funcCol = c.functioning>=80?'var(--green)':c.functioning>=50?'var(--amber)':'var(--red)';
    return `<div class="cat-card" data-cat="${k}" onclick="filterByCategory('${k}')">

  // Flags — only show if suggestion/text is meaningful (not "NA", not single char)

      const c = f[k]; if(!c) return;
      const isPoor = String(c.rating||'').trim()==='Poor';
      const notWorking = ['functioning','comfortable','maintained','sockets','available'].some(ff => String(c[ff]||'').trim()==='No');
      const hasIssue = k==='internet' && String(c.issues||'').trim()==='Yes';
      if(isPoor || notWorking || hasIssue){
        const rawText = c.suggestion || c.issues_text || (isPoor?'Rated Poor':'Not functioning');
        const text = String(rawText).trim();
        // Skip meaningless flag text
        if(text.length < 2 || /^(na|n\/a|none|no|yes|ok|fine|good|nothing|nope|noo|nah|not|nil|null|-|\.)$/i.test(text)) return;
        flags.push({cat:CAT_NAMES[k], text: esc(text), who:`${esc(f.student)} · ${esc(f.university)} · Room ${esc(f.classroom)}`});

let activeCatFilter = null;

function filterByCategory(cat){
  const cards = document.querySelectorAll('.cat-card');
  if(activeCatFilter === cat){
    // Clicking same card again clears highlight
    activeCatFilter = null;
    cards.forEach(c => c.classList.remove('active'));
    document.getElementById('cat-filter-label').style.display = 'none';
    // Remove all highlights from response items
    document.querySelectorAll('.resp-item').forEach(el => el.classList.remove('resp-item-highlight'));
  } else {
    activeCatFilter = cat;
    cards.forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
    const catNames = {tv:'TV',audio:'Audio',video:'Video',internet:'Internet/Wi-Fi',ac:'AC',benches:'Benches & Power',washrooms:'Washrooms'};
    const label = document.getElementById('cat-filter-label');
    label.style.display = 'flex';
    label.querySelector('span').textContent = 'Highlighting: ' + catNames[cat];
    // Highlight matching category in every response card
    document.querySelectorAll('.resp-item').forEach(el => {
      const itemCat = el.dataset.cat;
      el.classList.toggle('resp-item-highlight', itemCat === cat);
    });
    // Scroll to individual responses
    document.getElementById('resp-section').scrollIntoView({behavior:'smooth', block:'start'});
  }
}

function filterFlags(cat, btn){
  document.querySelectorAll('.flag-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.flag-item').forEach(item => {
    item.classList.toggle('hidden', cat !== 'all' && item.dataset.cat !== cat);
  });
}

function filterResponses(){
  const uni = (document.getElementById('uni-filter')||{}).value || 'all';
  const q   = ((document.getElementById('search')||{}).value||'').toLowerCase();
  const out = document.getElementById('resp-out');
  if(!out) return;

  const filtered = currentFeedback.filter(f =>
    (uni==='all' || f.university===uni) &&
    (!q || [f.student,f.university,f.classroom].some(v=>(v||'').toLowerCase().includes(q)))
  );

  if(!filtered.length){
    out.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">No matches</div>Try a different filter or search term.</div>`;
    return;
  }

  out.innerHTML = filtered.map(f => {
    const cats = Object.keys(CAT_NAMES).map(k=>{
      const c=f[k]; if(!c) return '';
      return `<div class="resp-item" data-cat="${k}"><span>${CAT_NAMES[k]}</span><span class="chip ${chipCls(c.rating)}">${c.rating||'—'}</span></div>`;
    }).join('');
    const oc = f.overall>=4?'chip-e':f.overall>=3?'chip-g':f.overall>=2?'chip-a':'chip-p';
    return `<div class="resp-card"><div class="resp-top"><div><div class="resp-name">${esc(f.student)}</div><div class="resp-meta">${esc(f.university)} · Room ${esc(f.classroom)}</div></div><span class="chip ${oc}">${f.overall}/5</span></div><div class="resp-grid">${cats}</div></div>`;
  }).join('');
  // Re-apply category highlight if one is active
  if(activeCatFilter){
    document.querySelectorAll('.resp-item').forEach(el => {
      el.classList.toggle('resp-item-highlight', el.dataset.cat === activeCatFilter);
    });
  }
  renderResolvedSection();
}

            <div style="font-size:12px;font-weight:600;margin-top:2px"><span class="st ${scls}">${d.status}</span>${d.subCount>1?` <span style="color:var(--amber);font-size:10px">(${d.subCount}x)</span>`:''}</div>
          </div>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Feedback</div>
        ${feedbackSections}
      </div>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function downloadReport(){
  const d = HISTORY[currentDate];
  if(!d) return;
  const feedback = (d.feedback||[]).filter(isValidFeedback);
  const stats = recalcStats(feedback, d.participation||[], d.stats||{});
  const catKeys = ['tv','audio','internet','ac','benches'];
  const catNames = {tv:'TV',audio:'Audio',internet:'Internet / Wi-Fi',ac:'AC',benches:'Benches & Power'};
  const funcFields = {tv:'functioning',audio:'functioning',internet:'available',ac:'comfortable',benches:'sockets'};
  const rn = v => ({excellent:4,good:3,average:2,poor:1}[String(v||'').toLowerCase()]||0);

  // Group by university
  const uniGroups = {};
  feedback.forEach(f => {
    const u = f.university||'Unknown';
    if(!uniGroups[u]) uniGroups[u] = [];
    uniGroups[u].push(f);
  });

  // Per-uni cat stats
  function uniCatStats(ufb){
    const res = {};
    catKeys.forEach(k => {
      const ratings = ufb.map(f=>rn(f[k]?.rating)).filter(v=>v>0);
      const avg = ratings.length ? Math.round(ratings.reduce((a,b)=>a+b,0)/ratings.length*10)/10 : 0;
      const ff = funcFields[k];
      const fr = ufb.filter(f=>f[k]?.[ff]);
      const fp = fr.length ? Math.round(fr.filter(f=>String(f[k][ff]).trim()==='Yes').length/fr.length*100) : 0;
      const poor = ufb.filter(f=>String(f[k]?.rating||'').trim()==='Poor'||String(f[k]?.[ff]||'').trim()==='No'||(k==='internet'&&String(f[k]?.issues||'').trim()==='Yes')).length;
      res[k] = {avg, fp, poor};
    });
    return res;
  }

  // Per-uni flags
  function uniFlags(ufb){
    const flags = [];
    ufb.forEach(f => {
      catKeys.forEach(k => {
        const c = f[k]; if(!c) return;
        const ff = funcFields[k];
        const isPoor = String(c.rating||'').trim()==='Poor';
        const notWorking = String(c[ff]||'').trim()==='No';
        const hasIssue = k==='internet' && String(c.issues||'').trim()==='Yes';
        if(isPoor||notWorking||hasIssue){
          const text = c.suggestion||c.issues_text||'';
          const clean = String(text).trim();
          if(clean.length>10 && !/^(na|n\/a|none|no|yes|ok|fine|good|nothing|nope|noo|nah|not|nil|null|-|\.)$/i.test(clean)){
            flags.push({cat:catNames[k], text:clean, who:`${f.student} · Room ${f.classroom}`, len:clean.length});
          }
        }
      });
    });
    // Sort by length descending, dedupe by student
    const seen = new Set();
    return flags.sort((a,b)=>b.len-a.len).filter(f=>{
      if(seen.has(f.who)) return false;
      seen.add(f.who); return true;
    });
  }

  // Auto-generate summary sentence per university
  function uniSummary(uni, ufb, uStats){
    const overalls = ufb.map(f=>f.overall).filter(v=>v>0);
    const avg = overalls.length ? Math.round(overalls.reduce((a,b)=>a+b,0)/overalls.length*10)/10 : 0;
    const worst = catKeys.reduce((a,b) => (uStats[a]?.avg||4) < (uStats[b]?.avg||4) ? a : b);
    const best = catKeys.reduce((a,b) => (uStats[a]?.avg||0) > (uStats[b]?.avg||0) ? a : b);
    const worstFlags = uStats[worst]?.poor||0;
    return `${ufb.length} responses this week. ${catNames[worst]} is the most critical concern with ${worstFlags} flag${worstFlags!==1?'s':''} and an avg rating of ${uStats[worst]?.avg||'—'}/4. ${catNames[best]} is performing best at ${uStats[best]?.avg||'—'}/4. Overall student satisfaction is ${avg}/5.`;
  }

  // Build uni sections
  const uniSections = Object.entries(uniGroups).sort().map(([uni, ufb]) => {
    const uStats = uniCatStats(ufb);
    const flags = uniFlags(ufb);
    const summary = uniSummary(uni, ufb, uStats);

    const catRows = catKeys.map(k => {
      const cs = uStats[k];
      return `<tr>
        <td style="padding:10px;border-bottom:0.5px solid #e5e7eb;font-size:12px">${catNames[k]}</td>
        <td style="padding:10px;border-bottom:0.5px solid #e5e7eb;font-size:12px">${cs.avg||'—'} / 4</td>
        <td style="padding:10px;border-bottom:0.5px solid #e5e7eb;font-size:12px">${cs.fp}%</td>
        <td style="padding:10px;border-bottom:0.5px solid #e5e7eb;font-size:12px">${cs.poor||'—'}</td>
      </tr>`;
    }).join('');

    const flagRows = flags.length === 0
      ? `<p style="font-size:12px;color:#9ca3af;padding:8px 0">No issues flagged.</p>`
      : flags.map((f,i) => `<div style="display:flex;gap:14px;padding:10px 0;border-bottom:0.5px solid #f3f4f6;font-size:12px;line-height:1.5">
          <span style="color:#9ca3af;min-width:16px;font-weight:500">${i+1}</span>
          <span style="font-weight:500;min-width:100px;color:#111827">${f.cat}</span>
          <div style="flex:1"><div style="color:#111827">${f.text}</div><div style="font-size:11px;color:#9ca3af;margin-top:2px">${f.who}</div></div>
        </div>`).join('');

    return `
      <div style="margin-bottom:32px">
        <div style="font-size:17px;font-weight:500;color:#111827;margin-bottom:8px">${uni}</div>
        <div style="font-size:12px;color:#6b7280;line-height:1.6;padding:10px 14px;background:#f9fafb;border-radius:8px;margin-bottom:16px">${summary}</div>
        <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:6px">Category Ratings</div>
        <table style="width:100%;border-collapse:collapse;margin-bottom:20px">
          <tr style="background:#f9fafb">
            <th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:500;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid #e5e7eb">Category</th>
            <th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:500;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid #e5e7eb">Avg Rating</th>
            <th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:500;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid #e5e7eb">Functioning</th>
            <th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:500;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid #e5e7eb">Issues</th>
          </tr>
          ${catRows}
        </table>
        <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:6px">Flagged Issues</div>
        <div style="margin-bottom:8px">${flagRows}</div>
      </div>`;
  }).join('<hr style="border:none;border-top:1px solid #e5e7eb;margin:4px 0 28px"/>');

  const overallAvg = stats.avgOverall||'—';
  const today = new Date().toLocaleDateString('en-IN',{timeZone:'Asia/Calcutta',day:'numeric',month:'long',year:'numeric'});

  const reportHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<title>Facilities Feedback Report - ${currentDate}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#fff;color:#111827;padding:40px 48px;max-width:720px;margin:0 auto;line-height:1.5}
  @media print{body{padding:20mm} @page{margin:20mm} .no-print{display:none}}
</style>
</head><body>
<div style="display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:20px;border-bottom:2px solid #111827;margin-bottom:28px">
  <div>
    <div style="font-size:22px;font-weight:500;color:#111827;margin-bottom:6px">Facilities Feedback Report</div>
    <div style="font-size:13px;color:#6b7280;line-height:1.8">
      Saturday, ${currentDate}<br>
      NIAT Program Operations<br>
      Generated automatically
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/programopscentral-art/infra-reports/main/niat-logo.png" style="width:48px;height:48px;border-radius:8px;object-fit:cover"/>
</div>

<div style="display:grid;grid-template-columns:repeat(4,1fr);border:0.5px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:36px">
  <div style="padding:14px 12px;text-align:center;border-right:0.5px solid #e5e7eb"><div style="font-size:22px;font-weight:500;color:#111827">${stats.totalResponses}</div><div style="font-size:10px;color:#9ca3af;margin-top:5px;text-transform:uppercase;letter-spacing:.06em">Responses</div></div>
  <div style="padding:14px 12px;text-align:center;border-right:0.5px solid #e5e7eb"><div style="font-size:22px;font-weight:500;color:#111827">${overallAvg}/5</div><div style="font-size:10px;color:#9ca3af;margin-top:5px;text-transform:uppercase;letter-spacing:.06em">Avg Rating</div></div>
  <div style="padding:14px 12px;text-align:center;border-right:0.5px solid #e5e7eb"><div style="font-size:22px;font-weight:500;color:#111827">${stats.flagCount}</div><div style="font-size:10px;color:#9ca3af;margin-top:5px;text-transform:uppercase;letter-spacing:.06em">Issues</div></div>
  <div style="padding:14px 12px;text-align:center"><div style="font-size:22px;font-weight:500;color:#111827">${stats.uniCount}</div><div style="font-size:10px;color:#9ca3af;margin-top:5px;text-transform:uppercase;letter-spacing:.06em">Universities</div></div>
</div>

${uniSections}

<div style="text-align:center;font-size:10px;color:#9ca3af;padding-top:16px;border-top:0.5px solid #e5e7eb;margin-top:8px">
  NIAT Facilities Feedback &nbsp;·&nbsp; Confidential &nbsp;·&nbsp; ${currentDate}
</div>
</body></html>`;

  const win = window.open('', '_blank');
  win.document.write(reportHtml);
  win.document.close();
  setTimeout(() => win.print(), 800);
}
const RESOLVE_WEBHOOK = 'https://niat2026.app.n8n.cloud/webhook/resolve';
let currentResolveFlag = null;
let currentResolveFeedback = null;
let resolvedItems = [];

function renderResolvedSection(){
  // Update KPI count
  const kpiVal = document.getElementById('resolved-kpi-val');
  if(kpiVal) kpiVal.textContent = resolvedItems.length;
  const outer = document.getElementById('resolved-outer');
  const wrap = document.getElementById('resolved-persistent');
  if(!outer || !wrap) return;
  if(resolvedItems.length === 0){ outer.style.display = 'none'; return; }
  outer.style.display = 'block';
  const list = document.getElementById('resolved-items-list');
  if(!list) return;
  list.innerHTML = resolvedItems.map(item => `
    <div class="resolved-item">
      <span class="resolved-cat-tag">${item.cat}</span>
      <span class="flag-text" style="flex:1">${item.text}</span>
      <span class="resolved-date">✅ ${item.date}</span>
      <span class="flag-who" style="width:100%">${item.who}</span>
      <span style="font-size:10px;color:#059669;width:100%;margin-top:2px">Resolution: ${item.note}</span>
    </div>`).join('');
}

function openResolveModal(btn){
  const flagEl = btn.closest('.flag-item');
  const idx = parseInt(flagEl.dataset.idx);
  currentResolveFlag = idx;
  const cat = flagEl.querySelector('.flag-cat').textContent;
  const text = flagEl.querySelector('.flag-text').textContent;
  const who = flagEl.querySelector('.flag-who').textContent;
  // Parse who: "StudentName · University · Room X"
  const parts = who.split(' · ');
  const studentName = parts[0]||'';
  const university = parts[1]||'';
  const room = parts[2]||'';
  // Find student email from currentFeedback
  const student = currentFeedback.find(f =>
    (f.student||'').toLowerCase().trim() === studentName.toLowerCase().trim()
  );
  currentResolveFeedback = {
    studentName, university, room,
    studentEmail: student?.email||'',
    category: cat, issueText: text,
    weekDate: currentDate
  };
  document.getElementById('resolve-issue-box').innerHTML =
    `<strong>${cat}</strong> — ${text}<br><span style="font-size:10px;color:#9ca3af;margin-top:4px;display:block">${who}</span>`;
  document.getElementById('resolve-note').value = '';
  document.getElementById('resolve-overlay').style.display = 'flex';
}

function closeResolveModal(){
  document.getElementById('resolve-overlay').style.display = 'none';
  currentResolveFlag = null;
  currentResolveFeedback = null;
}

async function sendResolution(){
  const note = document.getElementById('resolve-note').value.trim();
  if(!note){ document.getElementById('resolve-note').style.borderColor='#dc2626'; return; }
  document.getElementById('resolve-note').style.borderColor='#ede9fe';
  const btn = document.getElementById('resolve-send-btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    const payload = {
      ...currentResolveFeedback,
      resolutionNote: note
    };
    const res = await fetch(RESOLVE_WEBHOOK, {
      method: 'POST',
      mode: 'cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    // n8n may return non-200 even on success, so proceed if not network error
    const flagEl = document.getElementById('flag-' + currentResolveFlag);
    if(true){
      if(flagEl){
        const now = new Date();
          const dateStr = now.toLocaleDateString('en-IN', {day:'numeric',month:'short',timeZone:'Asia/Calcutta'});
          flagEl.style.display = 'none';
          // Add to resolved section
          const rCat = flagEl.querySelector('.flag-cat').textContent;
          const rText = flagEl.querySelector('.flag-text').textContent;
          const rWho = flagEl.querySelector('.flag-who').textContent;
          resolvedItems.push({cat:rCat, text:rText, who:rWho, note:note, date:dateStr});
          renderResolvedSection();
        }
        closeResolveModal();
    } else {
      btn.textContent = 'Failed — Retry';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = 'Failed — Retry';
    btn.disabled = false;
  }
}

function toggleTheme(){
  const dark = document.documentElement.dataset.theme==='dark';
  document.documentElement.dataset.theme = dark?'light':'dark';
  document.getElementById('theme-ico').innerHTML = dark
    ?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    :'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

buildSidebar();
// Auto-load most recent date that has valid data
const validDates = Object.keys(HISTORY)
  .filter(d => (HISTORY[d].feedback||[]).filter(isValidFeedback).length > 0)
  .sort().reverse();
if(validDates.length) loadDate(validDates[0]);
