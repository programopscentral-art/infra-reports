<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Facilities Feedback Report</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#f0f2f5;--surface:#fff;--surface2:#f8f9fb;--border:#e4e7ed;--border2:#d0d5df;--text:#111827;--sub:#6b7280;--dim:#9ca3af;--red:#dc2626;--amber:#d97706;--green:#059669;--blue:#2563eb;--purple:#7c3aed;--red-bg:#fef2f2;--amber-bg:#fffbeb;--green-bg:#ecfdf5;--blue-bg:#eff6ff;--shadow:0 1px 3px rgba(0,0,0,.08)}
[data-theme="dark"]{--bg:#0a0a0f;--surface:#111117;--surface2:#0f0f14;--border:#1e1e2a;--border2:#2a2a38;--text:#e8e8f0;--sub:#6b6b88;--dim:#3a3a50;--red:#f05555;--amber:#f0a030;--green:#3ec87a;--blue:#5b8cfa;--purple:#9b6dfa;--red-bg:rgba(240,85,85,.1);--amber-bg:rgba(240,160,48,.1);--green-bg:rgba(62,200,122,.1);--blue-bg:rgba(91,140,250,.1);--shadow:0 1px 3px rgba(0,0,0,.4)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* LAYOUT */
.layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;padding:16px 0;flex-shrink:0;z-index:50;transition:transform .2s}
.sidebar-header{padding:0 16px 14px;border-bottom:1px solid var(--border);margin-bottom:10px}
.sidebar-title{font-size:13px;font-weight:700;color:var(--text)}
.sidebar-sub{font-size:10px;color:var(--sub);font-family:'JetBrains Mono',monospace;margin-top:2px}
.sb-section{padding:0 8px;margin-bottom:4px}
.sb-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:0 8px;margin-bottom:4px;margin-top:12px;font-family:'JetBrains Mono',monospace}
.sb-year{font-size:11px;font-weight:600;color:var(--sub);padding:5px 8px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:6px}
.sb-year:hover{background:var(--surface2);color:var(--text)}
.sb-year.open{color:var(--text)}
.sb-year svg{width:10px;height:10px;transition:transform .15s;stroke:currentColor;fill:none;stroke-width:2}
.sb-year.open svg{transform:rotate(90deg)}
.sb-months{display:none;padding-left:8px}
.sb-year.open+.sb-months{display:block}
.sb-month{font-size:10px;font-weight:600;color:var(--sub);padding:4px 8px;cursor:pointer;border-radius:5px;margin-top:2px}
.sb-month:hover{color:var(--text)}
.sb-month.open{color:var(--text)}
.sb-dates{display:none;padding-left:8px}
.sb-month.open+.sb-dates{display:block}
.sb-date{font-size:11px;color:var(--sub);padding:5px 10px;cursor:pointer;border-radius:6px;font-family:'JetBrains Mono',monospace;transition:all .1s;display:flex;align-items:center;gap:6px}
.sb-date:hover{background:var(--surface2);color:var(--text)}
.sb-date.active{background:var(--blue-bg);color:var(--blue);font-weight:600}
.sb-date-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0}
.sb-date.active .sb-date-dot{background:var(--blue)}
.sb-empty{font-size:11px;color:var(--dim);padding:16px;text-align:center;line-height:1.6}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.header-left{display:flex;align-items:center;gap:10px}
.menu-btn{display:none;width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--sub);cursor:pointer;align-items:center;justify-content:center;font-size:16px}
.brand-name{font-size:13px;font-weight:700;color:var(--text)}
.brand-date{font-size:10px;color:var(--sub);font-family:'JetBrains Mono',monospace}
.header-right{display:flex;align-items:center;gap:8px}
.theme-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center}
.theme-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* MAIN */
.main-wrap{margin-left:220px;flex:1;min-width:0}
.main{padding:20px 16px 48px;max-width:720px;margin:0 auto}
.sec-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-family:'JetBrains Mono',monospace;margin:22px 0 10px}
.loading{text-align:center;padding:60px 20px;color:var(--dim);font-size:13px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 15px;display:flex;align-items:center;gap:11px;box-shadow:var(--shadow)}
.kpi-ico{width:36px;height:36px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.kpi-ico svg{width:16px;height:16px;stroke-width:1.75;fill:none}
.kpi-val{font-size:22px;font-weight:700;line-height:1;font-family:'JetBrains Mono',monospace}
.kpi-lbl{font-size:10px;color:var(--sub);margin-top:3px}

/* CATEGORY CARDS */
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.cat-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px}
.cat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-label{font-size:10px;color:var(--sub)}
.cat-value{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace}
.bar-wrap{height:6px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;overflow:hidden;margin:4px 0 8px}
.bar-fill{height:100%;border-radius:3px}

/* FLAGS */
.flag-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.flag-item{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.flag-item:last-child{border-bottom:none}
.flag-cat{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;white-space:nowrap;background:var(--red-bg);color:var(--red)}
.flag-text{font-size:12px;color:var(--sub);flex:1}
.flag-who{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace}

/* RESPONSES */
.resp-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:var(--shadow)}
.resp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.resp-name{font-size:13px;font-weight:600;color:var(--text)}
.resp-meta{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.resp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px}
.resp-item{font-size:10px;color:var(--sub);display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)}
.chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px}
.chip-e{background:var(--green-bg);color:var(--green)}.chip-g{background:var(--blue-bg);color:var(--blue)}.chip-a{background:var(--amber-bg);color:var(--amber)}.chip-p{background:var(--red-bg);color:var(--red)}

/* PARTICIPATION */
.p-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.p-av{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.p-info{flex:1}.p-name{font-size:13px;font-weight:600}.p-uni{font-size:10px;color:var(--sub)}
.p-ts{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-top:5px}
.st{font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px}
.st-sub{background:var(--green-bg);color:var(--green)}.st-op{background:var(--amber-bg);color:var(--amber)}.st-no{background:var(--surface2);color:var(--sub);border:1px solid var(--border)}

.empty{text-align:center;padding:36px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--dim);font-size:12px}
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;padding:10px 12px 10px 33px;outline:none;box-shadow:var(--shadow)}
.search-input::placeholder{color:var(--dim)}.search-input:focus{border-color:var(--blue)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim)}
.search-ico svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.footer{text-align:center;padding:20px 16px;font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;border-top:1px solid var(--border)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main-wrap{margin-left:0}
  .menu-btn{display:flex}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .cat-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Feedback History</div>
      <div class="sidebar-sub">Navigate by date</div>
    </div>
    <div id="sidebar-nav"><div class="sb-empty">Loading dates...</div></div>
  </div>

  <!-- MAIN -->
  <div class="main-wrap">
    <div class="header">
      <div class="header-left">
        <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div>
          <div class="brand-name">Facilities Feedback</div>
          <div class="brand-date" id="hdr-date">—</div>
        </div>
      </div>
      <div class="header-right">
        <button class="theme-btn" onclick="toggleTheme()"><svg id="theme-ico" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
      </div>
    </div>
    <div class="main" id="main-content">
      <div class="loading">Select a date from the sidebar to view feedback.</div>
    </div>
    <div class="footer">Facilities Feedback · n8n + Google Sheets + Gmail SMTP</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// DATA_START
const REPORT_DATE = "2026-06-19";
const UNIVERSITIES = ["Academy of Maritime Education & Training (AMET)","Ajeenkya DY Patil University (ADYPU)","Annamacharya University","Aurora University","CDU","CITY & CIET","Crescent University","KKH Hyderabad","Mallareddy (MRV)","NIAT Chevella","Noida International University (NIU)","NRI Institute of Technology","NSRIT","S-VYASA University","Sanjay Ghodawat University (SGU)","Takshashila University","VGU University","Yenepoya"];
const HISTORY = {"2026-06-19":{"feedback":[],"participation":[],"stats":{"totalResponses":0,"uniCount":0,"avgOverall":0,"flagCount":0,"totalStudents":0,"submitted":0,"notOpened":0,"categories":{}}}};
// DATA_END
// ══════════════════════════════════════════════════════

const CAT_NAMES={tv:'TV',audio:'Audio',video:'Video',internet:'Internet/Wi-Fi',ac:'AC',benches:'Benches & Power',washrooms:'Washrooms'};
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentDate = REPORT_DATE;
let currentFeedback = [];
let currentUniFilter = 'all';

function ratingColor(v){return v>=3.5?'var(--green)':v>=2.5?'var(--amber)':'var(--red)'}
function chipCls(v){const l=String(v||'').toLowerCase();return l==='excellent'?'chip-e':l==='good'?'chip-g':l==='average'?'chip-a':l==='poor'?'chip-p':'chip-g'}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}

function buildSidebar(){
  const dates = Object.keys(HISTORY).sort().reverse();
  if(!dates.length){document.getElementById('sidebar-nav').innerHTML='<div class="sb-empty">No reports yet.</div>';return;}

  const tree = {};
  dates.forEach(d => {
    const [y,m] = d.split('-');
    if(!tree[y]) tree[y]={};
    const mName = MONTHS[parseInt(m)-1];
    if(!tree[y][mName]) tree[y][mName]=[];
    tree[y][mName].push(d);
  });

  let html = '';
  Object.keys(tree).sort().reverse().forEach((year,yi) => {
    html += `<div class="sb-section">`;
    html += `<div class="sb-year open" onclick="this.classList.toggle('open')"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>${year}</div>`;
    html += `<div class="sb-months">`;
    Object.keys(tree[year]).forEach((month,mi) => {
      html += `<div class="sb-month open" onclick="this.classList.toggle('open')">${month}</div>`;
      html += `<div class="sb-dates">`;
      tree[year][month].forEach(d => {
        const day = parseInt(d.split('-')[2]);
        const active = d === currentDate ? ' active' : '';
        html += `<div class="sb-date${active}" onclick="loadDate('${d}')"><span class="sb-date-dot"></span>Sat ${day}</div>`;
      });
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('sidebar-nav').innerHTML = html;
}

function loadDate(date){
  currentDate = date;
  const data = HISTORY[date];
  if(!data){document.getElementById('main-content').innerHTML='<div class="loading">No data for this date.</div>';return;}
  document.getElementById('hdr-date').textContent = date;
  document.querySelectorAll('.sb-date').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sb-date').forEach(el => { if(el.textContent.includes(parseInt(date.split('-')[2]))) el.classList.add('active'); });
  renderReport(data.feedback||[], data.participation||[], data.stats||{});
}

function renderReport(FEEDBACK, PARTICIPATION, STATS){
  currentFeedback = FEEDBACK;
  currentUniFilter = 'all';
  const cats = STATS.categories || {};
  const catCards = Object.keys(CAT_NAMES).map(k => {
    const c = cats[k]||{avgRating:0,functioning:0,poorCount:0};
    const col = ratingColor(c.avgRating);
    const pct = Math.round((c.avgRating/4)*100);
    return `<div class="cat-card">
      <div class="cat-name" style="color:${col}">${CAT_NAMES[k]}</div>
      <div class="cat-row"><span class="cat-label">Avg Rating</span><span class="cat-value" style="color:${col}">${c.avgRating||'—'}</span></div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="cat-row"><span class="cat-label">Functioning</span><span class="cat-value" style="color:${c.functioning>=80?'var(--green)':c.functioning>=50?'var(--amber)':'var(--red)'}">${c.functioning||0}%</span></div>
      ${c.poorCount?`<div class="cat-row"><span class="cat-label">Poor/Issues</span><span class="cat-value" style="color:var(--red)">${c.poorCount}</span></div>`:''}
    </div>`;
  }).join('');

  const flags = [];
  FEEDBACK.forEach(f => {
    Object.keys(CAT_NAMES).forEach(k => {
      const c = f[k]; if(!c) return;
      if(c.rating==='Poor') flags.push({cat:CAT_NAMES[k],text:c.suggestion||'Rated Poor',who:`${f.student} · ${f.university} · ${f.classroom}`});
      if(c.functioning==='No'||c.comfortable==='No'||c.maintained==='No'||c.sockets==='No'||c.available==='No'||c.issues==='Yes')
        flags.push({cat:CAT_NAMES[k],text:c.suggestion||c.issues_text||'Not functioning',who:`${f.student} · ${f.university} · ${f.classroom}`});
    });
  });

  const flagsHtml = flags.length === 0
    ? '<div class="empty">No issues flagged.</div>'
    : `<div class="flag-list">${flags.map(f=>`<div class="flag-item"><span class="flag-cat">${f.cat}</span><span class="flag-text">${f.text}</span><span class="flag-who">${f.who}</span></div>`).join('')}</div>`;

  const unis = UNIVERSITIES.length ? UNIVERSITIES : [...new Set(FEEDBACK.map(f => f.university).filter(Boolean))];
  const uniOptions = unis.map(u => `<option value="${u}">${u}</option>`).join('');

  const respHtml = `
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <select id="uni-filter" onchange="filterResponses()" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);font-family:'Inter',sans-serif;cursor:pointer;box-shadow:var(--shadow);">
        <option value="all">All Universities</option>
        ${uniOptions}
      </select>
      <div class="search-wrap" style="flex:1;margin-bottom:0"><span class="search-ico"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span><input class="search-input" id="search" placeholder="Search student, classroom…" oninput="filterResponses()"/></div>
    </div>
    <div id="resp-out"></div>`;


  const partHtml = PARTICIPATION.length === 0
    ? '<div class="empty">No participation data.</div>'
    : PARTICIPATION.map(p => {
      const scls = p.status==='Submitted'?'st-sub':p.status==='Opened only'?'st-op':'st-no';
      return `<div class="p-card"><div class="p-av" style="background:var(--blue-bg);color:var(--blue)">${initials(p.name)}</div><div class="p-info"><div class="p-name">${p.name}</div><div class="p-uni">${p.university}</div><div class="p-ts">${p.openedAt&&p.openedAt!=='—'?'Opened '+p.openedAt:'Not opened'}</div></div><div><span class="st ${scls}">${p.status}</span></div></div>`;
    }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="sec-label">Overview</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-ico" style="background:var(--blue-bg)"><svg viewBox="0 0 24 24" stroke="var(--blue)" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div><div class="kpi-val" style="color:var(--blue)">${STATS.totalResponses||0}</div><div class="kpi-lbl">Responses</div></div></div>
      <div class="kpi"><div class="kpi-ico" style="background:var(--green-bg)"><svg viewBox="0 0 24 24" stroke="var(--green)" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div><div><div class="kpi-val" style="color:var(--green)">${STATS.avgOverall?STATS.avgOverall.toFixed(1)+'/5':'—'}</div><div class="kpi-lbl">Avg Rating</div></div></div>
      <div class="kpi"><div class="kpi-ico" style="background:var(--red-bg)"><svg viewBox="0 0 24 24" stroke="var(--red)" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div><div class="kpi-val" style="color:var(--red)">${STATS.flagCount||0}</div><div class="kpi-lbl">Issues Flagged</div></div></div>
      <div class="kpi"><div class="kpi-ico" style="background:var(--amber-bg)"><svg viewBox="0 0 24 24" stroke="var(--amber)" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div><div><div class="kpi-val" style="color:var(--amber)">${STATS.notOpened||0}</div><div class="kpi-lbl">Not Opened</div></div></div>
    </div>
    <div class="sec-label">Category Ratings</div>
    <div class="cat-grid">${catCards}</div>
    <div class="sec-label">Flagged Issues</div>
    ${flagsHtml}
    <div class="sec-label">Individual Responses</div>
    ${respHtml}
    <div class="sec-label">Student Participation</div>
    ${partHtml}
  `;
  setTimeout(() => filterResponses(), 0);
}

function filterResponses(){
  const uniSel = document.getElementById('uni-filter');
  const searchEl = document.getElementById('search');
  const uni = uniSel ? uniSel.value : 'all';
  const q = searchEl ? searchEl.value.toLowerCase() : '';
  const out = document.getElementById('resp-out');
  if(!out) return;

  const filtered = currentFeedback.filter(f =>
    (uni === 'all' || f.university === uni) &&
    (!q || [f.student,f.university,f.classroom].some(v => (v||'').toLowerCase().includes(q)))
  );

  if(!filtered.length){
    out.innerHTML = '<div class="empty">No responses match filters.</div>';
    return;
  }

  out.innerHTML = filtered.map(f => {
    const cats = Object.keys(CAT_NAMES).map(k => {
      const c = f[k]; if(!c) return '';
      return `<div class="resp-item"><span>${CAT_NAMES[k]}</span><span class="chip ${chipCls(c.rating)}">${c.rating||'—'}</span></div>`;
    }).join('');
    return `<div class="resp-card"><div class="resp-top"><div><span class="resp-name">${f.student}</span><br/><span class="resp-meta">${f.university} · Room ${f.classroom}</span></div><span class="chip ${f.overall>=4?'chip-e':f.overall>=3?'chip-g':f.overall>=2?'chip-a':'chip-p'}">${f.overall}/5</span></div><div class="resp-grid">${cats}</div></div>`;
  }).join('');
}

function toggleTheme(){
  const dark = document.documentElement.dataset.theme==='dark';
  document.documentElement.dataset.theme = dark?'light':'dark';
  document.getElementById('theme-ico').innerHTML = dark
    ?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    :'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

// Init
buildSidebar();
if(HISTORY[REPORT_DATE]) loadDate(REPORT_DATE);
else { const dates = Object.keys(HISTORY).sort().reverse(); if(dates.length) loadDate(dates[0]); }
</script>
